<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<title>Trip Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Surface elevation (lighter = higher) */
  --surface-0:#0f172a;--surface-1:#141c2e;--surface-2:#182032;--surface-3:#1e293b;
  --surface-glass:rgba(30,41,59,0.75);
  /* Backward-compatible aliases */
  --bg:var(--surface-0);--bg2:var(--surface-3);--card:var(--surface-glass);
  --border:rgba(255,255,255,0.1);--border-subtle:rgba(255,255,255,0.06);
  /* Accent colors */
  --blue:#60a5fa;--green:#34d399;--amber:#fbbf24;--red:#f87171;--purple:#a855f7;
  /* Semantic colors */
  --color-success:#34d399;--color-success-muted:rgba(52,211,153,0.12);
  --color-warning:#fbbf24;--color-warning-muted:rgba(251,191,36,0.12);
  --color-error:#f87171;--color-error-muted:rgba(248,113,113,0.12);
  --color-info:#818cf8;--color-info-muted:rgba(129,140,248,0.12);
  /* Category colors */
  --cat-flight:#60a5fa;--cat-flight-muted:rgba(96,165,250,0.15);
  --cat-hotel:#34d399;--cat-hotel-muted:rgba(52,211,153,0.12);
  --cat-activity:#fb923c;--cat-activity-muted:rgba(251,146,60,0.12);
  --cat-restaurant:#f472b6;--cat-restaurant-muted:rgba(244,114,182,0.12);
  --cat-beach:#38bdf8;--cat-beach-muted:rgba(56,189,248,0.12);
  --cat-baby:#fbbf24;--cat-baby-muted:rgba(251,191,36,0.12);
  /* Text hierarchy */
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --radius:16px;--radius-sm:8px;
  font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  color:var(--text);background:var(--bg);
  -webkit-tap-highlight-color:transparent;
}
/* Ambient background gradient */
body::before{
  content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(ellipse at 20% 50%,rgba(96,165,250,0.06) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 20%,rgba(168,85,247,0.04) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}
/* Reduced motion */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{display:flex;flex-direction:column;position:relative}

/* Status bar spacer for iOS */
.safe-top{height:env(safe-area-inset-top,0px);background:var(--bg)}

/* Header */
.header{
  padding:12px 16px 8px;background:var(--bg);position:relative;z-index:10;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.trip-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);font-weight:600}
.traveler-pills{display:flex;gap:6px}
.pill{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,0.06);color:var(--text2)}
.date-nav{display:flex;align-items:center;justify-content:space-between;gap:8px}
.nav-btn{
  width:44px;height:44px;border:none;background:rgba(255,255,255,0.05);
  color:var(--text);font-size:20px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  -webkit-appearance:none;touch-action:manipulation;
}
.nav-btn:active{background:rgba(255,255,255,0.12)}
.date-center{text-align:center;flex:1}
.date-main{font-size:18px;font-weight:700;color:var(--text)}
.date-sub{font-size:12px;color:var(--text2);margin-top:1px}
.day-badge{
  display:inline-block;font-size:10px;padding:2px 10px;border-radius:20px;
  margin-top:4px;font-weight:600;
}
.badge-travel{background:rgba(96,165,250,0.15);color:var(--blue)}
.badge-stay{background:rgba(52,211,153,0.15);color:var(--green)}
.badge-transfer{background:rgba(251,191,36,0.15);color:#fef3c7}

/* Day chips (replaces dots) */
.day-chips{
  display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
  padding:6px 16px 4px;flex-shrink:0;scroll-snap-type:x mandatory;
}
.day-chips::-webkit-scrollbar{display:none}
.day-chip{
  flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;
  background:var(--surface-1);border:1px solid var(--border-subtle);
  white-space:nowrap;scroll-snap-align:center;cursor:pointer;
  transition:all .2s;color:var(--text2);
}
.day-chip.active{border-color:var(--blue);color:var(--blue);background:rgba(96,165,250,0.1)}
.day-chip.travel{border-color:rgba(96,165,250,0.2)}
.day-chip.stay{border-color:rgba(52,211,153,0.15)}
.day-chip.transfer{border-color:rgba(251,191,36,0.15)}
.day-chip.active.travel{border-color:var(--blue);color:var(--blue);background:rgba(96,165,250,0.12)}
.day-chip.active.stay{border-color:var(--green);color:var(--green);background:rgba(52,211,153,0.1)}
.day-chip.active.transfer{border-color:var(--amber);color:#fef3c7;background:rgba(251,191,36,0.1)}

/* Swipe container */
.swipe-container{
  flex:1;overflow:hidden;position:relative;
}
.swipe-track{
  display:flex;height:100%;transition:transform .3s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.day-panel{
  min-width:100%;height:100%;overflow-y:auto;overflow-x:hidden;
  padding:12px 16px 20px;-webkit-overflow-scrolling:touch;
}

/* Cards — glassmorphism */
.card{
  background:var(--surface-glass);
  backdrop-filter:blur(12px) saturate(1.2);-webkit-backdrop-filter:blur(12px) saturate(1.2);
  border:1px solid var(--border);border-top-color:rgba(255,255,255,0.12);
  border-radius:var(--radius);padding:16px;margin-bottom:12px;
  box-shadow:0 4px 24px rgba(0,0,0,0.15);
  transition:transform 150ms cubic-bezier(0.2,0,0,1),background 150ms ease;
}
.card:active{transform:scale(0.98);background:var(--surface-2)}
/* Card entrance animation */
.day-panel .card{opacity:0;transform:translateY(12px);animation:card-enter .3s cubic-bezier(0.2,0,0,1) forwards}
.day-panel .card:nth-child(2){animation-delay:60ms}
.day-panel .card:nth-child(3){animation-delay:120ms}
.day-panel .card:nth-child(4){animation-delay:180ms}
.day-panel .card:nth-child(5){animation-delay:240ms}
.day-panel .card:nth-child(6){animation-delay:300ms}
@keyframes card-enter{to{opacity:1;transform:translateY(0)}}
.card-header{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
}
.card-icon{
  width:40px;height:40px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.card-icon.flight{background:rgba(96,165,250,0.15)}
.card-icon.hotel{background:rgba(52,211,153,0.15)}
.card-icon.car{background:rgba(168,85,247,0.15)}
.card-icon.checkout{background:rgba(248,113,113,0.15)}
.card-icon.checkin{background:rgba(52,211,153,0.15)}
.card-icon.baby{background:rgba(251,191,36,0.15)}
.card-icon.transport{background:rgba(148,163,184,0.12)}
.card-icon.info{background:rgba(96,165,250,0.1)}
.card-title{font-size:15px;font-weight:700}
.card-subtitle{font-size:12px;color:var(--text2)}

.flight-route{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;margin:8px 0;border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.route-point{text-align:center}
.route-code{font-size:22px;font-weight:800;letter-spacing:1px}
.route-city{font-size:11px;color:var(--text2)}
.route-time{font-size:13px;color:var(--blue);font-weight:600;margin-top:2px}
.route-line{
  flex:1;height:1px;background:var(--border);margin:0 12px;position:relative;
}
.route-line::after{
  content:'';position:absolute;right:-2px;top:-3px;
  width:0;height:0;border-left:6px solid var(--text3);
  border-top:3px solid transparent;border-bottom:3px solid transparent;
}
.route-duration{
  position:absolute;top:-18px;left:50%;transform:translateX(-50%);
  font-size:10px;color:var(--text3);white-space:nowrap;
}
.next-day{font-size:9px;color:var(--amber);font-weight:600}

.detail-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;font-size:13px;
}
.detail-label{color:var(--text2)}
.detail-value{font-weight:600;text-align:right}
.conf-code{
  font-family:'SF Mono',SFMono-Regular,Menlo,monospace;
  color:var(--amber);font-weight:700;letter-spacing:.5px;
}

.passenger-row{
  display:flex;align-items:center;gap:8px;padding:6px 0;
  border-bottom:1px solid var(--border);font-size:13px;
}
.passenger-row:last-child{border-bottom:none}
.pax-name{flex:1}
.pax-seat{
  font-size:11px;padding:2px 8px;background:rgba(255,255,255,0.06);
  border-radius:4px;color:var(--text2);font-family:monospace;
}
.pax-type{font-size:10px;color:var(--text3)}

.night-counter{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;background:rgba(52,211,153,0.1);
  border-radius:20px;font-size:12px;color:var(--green);font-weight:600;
}

.amenity-tag{
  display:inline-block;padding:6px 12px;margin:3px;
  background:rgba(251,191,36,0.12);border-radius:20px;
  font-size:11px;color:#fef3c7;min-height:32px;
}

.section-title{
  font-size:12px;text-transform:uppercase;letter-spacing:1px;
  color:var(--text3);font-weight:600;margin:16px 0 8px;
}

.placeholder-card{
  background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.08);
  border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:12px;
}
.placeholder-card .ph-icon{font-size:24px;margin-bottom:4px}
.placeholder-card .ph-text{font-size:12px;color:var(--text3)}

.notes-card{
  background:rgba(96,165,250,0.05);border:1px solid rgba(96,165,250,0.1);
  border-radius:var(--radius);padding:12px;margin-bottom:12px;
}
.note-item{font-size:13px;color:var(--text2);padding:3px 0;padding-left:16px;position:relative}
.note-item::before{content:'\2022';position:absolute;left:0;color:var(--blue)}

/* Transport badge */
.transport-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;background:rgba(148,163,184,0.08);
  border-radius:20px;font-size:12px;color:var(--text2);margin-bottom:12px;
}

/* Bookings tab */
.bookings-view{padding:12px 16px 20px;overflow-y:auto;height:100%;-webkit-overflow-scrolling:touch}
.booking-flight{
  display:flex;align-items:center;gap:12px;padding:12px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:8px;
}
.bf-icon{font-size:20px;width:40px;text-align:center;flex-shrink:0}
.bf-info{flex:1}
.bf-route{font-size:14px;font-weight:700}
.bf-detail{font-size:12px;color:var(--text2)}
.bf-conf{font-size:11px;font-family:monospace;color:var(--amber)}
.bf-status{
  font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;
  background:rgba(52,211,153,0.12);color:var(--green);text-transform:uppercase;
}

.booking-hotel{
  padding:14px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:8px;
}
.bh-name{font-size:15px;font-weight:700;margin-bottom:2px}
.bh-city{font-size:12px;color:var(--text2)}
.bh-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.bh-dates{font-size:12px;color:var(--text2)}
.bh-nights{font-size:11px;padding:2px 8px;background:rgba(52,211,153,0.1);border-radius:20px;color:var(--green)}
.bh-conf{font-size:11px;font-family:monospace;color:var(--amber);margin-top:4px}

/* Bottom nav */
.bottom-nav{
  display:flex;background:var(--bg2);border-top:1px solid var(--border);
  padding-bottom:env(safe-area-inset-bottom,0px);flex-shrink:0;
}
.nav-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 0 8px;gap:2px;border:none;background:none;
  color:var(--text3);font-size:10px;cursor:pointer;
  -webkit-appearance:none;touch-action:manipulation;min-height:44px;
}
.nav-tab.active{color:var(--blue)}
.nav-tab .tab-icon{font-size:20px;line-height:1}

/* Views */
.view{display:none;flex:1;overflow:hidden}
.view.active{display:flex;flex-direction:column}

/* Map */
#map-container{flex:1;position:relative}
#mapbox-map{width:100%;height:100%}
.map-filters{
  position:absolute;top:12px;left:12px;right:12px;z-index:5;
  display:flex;gap:6px;flex-wrap:wrap;
}
.map-chip{
  padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;
  background:rgba(15,23,42,0.85);color:var(--text2);border:1px solid var(--border);
  cursor:pointer;-webkit-appearance:none;touch-action:manipulation;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:all .15s;white-space:nowrap;
}
.map-chip.active{color:var(--blue);border-color:rgba(96,165,250,0.4);background:rgba(96,165,250,0.15)}
.map-marker{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;border:2px solid rgba(255,255,255,0.3);
  box-shadow:0 2px 8px rgba(0,0,0,0.4);transition:transform .15s;
}
.map-marker:hover{transform:scale(1.15)}
.map-marker.accommodation{background:#059669}
.map-marker.activity{background:#ea580c}
.map-marker.restaurant{background:#dc2626}
.map-marker.beach{background:#7c3aed}
.map-marker.market{background:#d97706}
.map-marker.airport{background:#2563eb}
.mapboxgl-popup-content{
  background:var(--bg2)!important;color:var(--text)!important;
  border-radius:var(--radius)!important;padding:14px 16px!important;
  box-shadow:0 4px 24px rgba(0,0,0,0.5)!important;
  border:1px solid var(--border)!important;max-width:220px!important;
}
.mapboxgl-popup-tip{border-top-color:var(--bg2)!important}
.mapboxgl-popup-close-button{color:var(--text2)!important;font-size:18px!important;right:6px!important;top:4px!important}
.mapboxgl-ctrl-geolocate{background:var(--surface-3)!important;color:var(--text)!important;border:1px solid var(--border)!important}
.mapboxgl-ctrl-geolocate:hover{background:var(--surface-2)!important}
.mapboxgl-ctrl-geolocate.mapboxgl-ctrl-geolocate-active{color:var(--blue)!important}
.mapboxgl-user-location-dot,.mapboxgl-user-location-dot::before{background-color:var(--blue)!important}
.mapboxgl-user-location-accuracy-circle{background-color:rgba(96,165,250,0.15)!important}
.popup-name{font-size:14px;font-weight:700;margin-bottom:4px}
.popup-type{
  display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;
  padding:2px 8px;border-radius:10px;margin-bottom:8px;letter-spacing:.5px;
}
.popup-type.accommodation{background:rgba(5,150,105,0.2);color:#34d399}
.popup-type.activity{background:rgba(234,88,12,0.2);color:#fb923c}
.popup-type.restaurant{background:rgba(220,38,38,0.2);color:#f87171}
.popup-type.beach{background:rgba(124,58,237,0.2);color:#a78bfa}
.popup-type.market{background:rgba(217,119,6,0.2);color:#fbbf24}
.popup-type.airport{background:rgba(37,99,235,0.2);color:#60a5fa}
.popup-dir{
  display:inline-block;font-size:12px;color:var(--blue);text-decoration:none;font-weight:600;
}
.popup-dir:hover{text-decoration:underline}

/* Map POI drawer */
.map-drawer{
  position:absolute;bottom:0;left:0;right:0;z-index:10;
  background:var(--surface-0);border-top:1px solid var(--border);
  border-radius:16px 16px 0 0;
  max-height:45%;transition:max-height .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  box-shadow:0 -4px 24px rgba(0,0,0,0.3);
}
.map-drawer.collapsed{max-height:44px}
.map-drawer-handle{
  padding:10px 16px 8px;cursor:pointer;display:flex;align-items:center;gap:8px;
  flex-shrink:0;-webkit-tap-highlight-color:transparent;
}
.drawer-grip{
  width:32px;height:4px;border-radius:2px;background:rgba(255,255,255,0.2);
  margin:0 auto 0 0;position:absolute;left:50%;transform:translateX(-50%);top:6px;
}
.drawer-title{font-size:13px;font-weight:600;color:var(--text)}
.drawer-count{font-size:11px;color:var(--text3);margin-left:auto}
.map-drawer-list{
  overflow-y:auto;padding:0 12px 12px;flex:1;-webkit-overflow-scrolling:touch;
}
.drawer-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  background:var(--surface-1);border:1px solid var(--border-subtle);
  border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;
  transition:background .15s,transform .15s;
}
.drawer-item:active{background:var(--surface-2);transform:scale(0.98)}
.drawer-item-icon{
  width:32px;height:32px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:14px;flex-shrink:0;
}
.drawer-item-icon.activity{background:var(--cat-activity-muted)}
.drawer-item-icon.restaurant{background:var(--cat-restaurant-muted)}
.drawer-item-icon.beach{background:var(--cat-beach-muted)}
.drawer-item-info{flex:1;min-width:0}
.drawer-item-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drawer-item-meta{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drawer-item-dist{font-size:11px;color:var(--blue);font-weight:600;flex-shrink:0;white-space:nowrap}

/* Status view */
.status-view{padding:16px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.status-countdown{
  text-align:center;padding:24px;margin-bottom:16px;
  background:linear-gradient(135deg,rgba(96,165,250,0.1),rgba(168,85,247,0.1));
  border-radius:var(--radius);border:1px solid var(--border);
}
.countdown-num{font-size:48px;font-weight:800;color:var(--blue)}
.countdown-label{font-size:14px;color:var(--text2);margin-top:4px}
.status-item{
  display:flex;align-items:center;gap:12px;padding:12px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:8px;
}
.si-icon{font-size:20px;width:36px;text-align:center}
.si-info{flex:1}
.si-title{font-size:14px;font-weight:600}
.si-detail{font-size:12px;color:var(--text2)}

/* AM/PM transfer sections */
.transfer-label{
  display:flex;align-items:center;gap:8px;margin:12px 0 8px;
}
.transfer-label .tl-badge{
  font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;
  text-transform:uppercase;letter-spacing:1px;
}
.tl-am{background:rgba(251,191,36,0.15);color:#fef3c7}
.tl-mid{background:rgba(96,165,250,0.15);color:var(--blue)}
.tl-pm{background:rgba(52,211,153,0.15);color:var(--green)}
.transfer-label .tl-text{font-size:13px;color:var(--text2)}

/* Tips view */
.tips-view{padding:16px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tips-dest-header{
  font-size:18px;font-weight:700;margin-bottom:4px;
}
.tips-dest-sub{font-size:12px;color:var(--text2);margin-bottom:16px}
.tips-section{margin-bottom:20px}
.tips-section-title{
  font-size:11px;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--text3);font-weight:600;margin-bottom:8px;
}
.emergency-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;
}
.emergency-card{
  background:var(--surface-glass);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px;text-align:center;
}
.emergency-card a{color:var(--blue);text-decoration:none;font-size:18px;font-weight:800;display:block;margin-top:4px}
.emergency-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.phrase-card{
  background:var(--surface-glass);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 14px;margin-bottom:6px;display:flex;justify-content:space-between;
  align-items:center;cursor:pointer;transition:background .15s;
}
.phrase-card:active{background:var(--surface-2)}
.phrase-local{font-size:14px;font-weight:600}
.phrase-phonetic{font-size:11px;color:var(--text2);font-style:italic}
.phrase-english{font-size:12px;color:var(--text3)}
.phrase-copy{font-size:10px;color:var(--blue);flex-shrink:0;margin-left:8px}
.tip-info-card{
  background:var(--surface-glass);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;margin-bottom:8px;
}
.tip-info-title{font-size:13px;font-weight:600;margin-bottom:4px}
.tip-info-text{font-size:12px;color:var(--text2);line-height:1.5}

/* Baby clock card */
.baby-clock{
  background:linear-gradient(135deg,rgba(251,191,36,0.08),rgba(168,85,247,0.06));
  border:1px solid rgba(251,191,36,0.15);border-radius:var(--radius);
  padding:14px;margin-bottom:12px;
}
.baby-clock-title{font-size:12px;font-weight:600;color:#fef3c7;margin-bottom:8px}
.baby-clock-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.baby-clock-item{text-align:center;padding:6px 4px;border-radius:var(--radius-sm);font-size:11px}
.baby-clock-item.sleeping{background:rgba(99,102,241,0.12);color:#a5b4fc}
.baby-clock-item.awake{background:rgba(52,211,153,0.1);color:var(--green)}
.baby-clock-item.nap{background:rgba(251,191,36,0.1);color:#fef3c7}
.bcl-local{font-weight:700;font-size:13px}
.bcl-body{font-size:10px;color:var(--text3);margin-top:2px}
.bcl-label{font-size:9px;margin-top:2px;opacity:0.7}

/* Toast notification */
.toast{
  position:fixed;top:env(safe-area-inset-top,16px);left:16px;right:16px;
  background:var(--surface-3);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;z-index:1000;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  transform:translateY(-120%);transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.toast.show{transform:translateY(0)}
.toast-title{font-size:13px;font-weight:600;margin-bottom:2px}
.toast-body{font-size:12px;color:var(--text2)}

/* Activity & restaurant cards */
.activity-card,.restaurant-card{
  background:var(--surface-glass);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;margin-bottom:8px;cursor:pointer;
  transition:transform .15s,background .15s;
}
.activity-card:active,.restaurant-card:active{transform:scale(0.98);background:var(--surface-2)}
.ar-header{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.ar-icon{
  width:36px;height:36px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
}
.ar-icon.activity{background:var(--cat-activity-muted)}
.ar-icon.restaurant{background:var(--cat-restaurant-muted)}
.ar-icon.beach{background:var(--cat-beach-muted)}
.ar-name{font-size:14px;font-weight:600;flex:1}
.ar-baby{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(52,211,153,0.1);color:var(--green);flex-shrink:0}
.ar-details{display:flex;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--text2);margin-bottom:6px}
.ar-detail{display:flex;align-items:center;gap:3px}
.ar-desc{font-size:12px;color:var(--text2);line-height:1.4;display:none}
.activity-card.expanded .ar-desc,.restaurant-card.expanded .ar-desc{display:block;margin-top:6px}
.ar-baby-notes{font-size:11px;color:var(--green);margin-top:4px;display:none}
.activity-card.expanded .ar-baby-notes,.restaurant-card.expanded .ar-baby-notes{display:block}
.ar-actions{display:none;margin-top:8px;gap:8px}
.activity-card.expanded .ar-actions,.restaurant-card.expanded .ar-actions{display:flex}
.ar-dir-link{font-size:11px;color:var(--blue);text-decoration:none;font-weight:600}

/* Timeline view */
.timeline-toggle{
  display:flex;gap:2px;background:var(--surface-1);border-radius:6px;padding:2px;margin-left:auto;
}
.timeline-toggle button{
  padding:4px 10px;border:none;background:none;color:var(--text3);
  font-size:11px;font-weight:600;border-radius:4px;cursor:pointer;
}
.timeline-toggle button.active{background:var(--surface-3);color:var(--text)}
.timeline-container{padding:12px 16px 20px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.timeline-rail{position:relative;padding-left:44px}
.timeline-rail::before{
  content:'';position:absolute;left:18px;top:0;bottom:0;
  width:2px;background:var(--border);
}
.tl-event{
  position:relative;padding:8px 0 16px;
}
.tl-event::before{
  content:'';position:absolute;left:-30px;top:12px;
  width:10px;height:10px;border-radius:50%;border:2px solid var(--border);
  background:var(--surface-0);z-index:1;
}
.tl-event.flight::before{background:var(--cat-flight);border-color:var(--cat-flight)}
.tl-event.hotel::before{background:var(--cat-hotel);border-color:var(--cat-hotel)}
.tl-event.activity::before{background:var(--cat-activity);border-color:var(--cat-activity)}
.tl-event.restaurant::before{background:var(--cat-restaurant);border-color:var(--cat-restaurant)}
.tl-event.transport::before{background:var(--purple);border-color:var(--purple)}
.tl-event.checkout::before{background:var(--red);border-color:var(--red)}
.tl-event.checkin::before{background:var(--green);border-color:var(--green)}
.tl-time{
  position:absolute;left:-44px;top:9px;font-size:10px;font-weight:700;
  color:var(--text3);width:32px;text-align:right;
}
.tl-card{
  background:var(--surface-glass);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 12px;
}
.tl-card-title{font-size:13px;font-weight:600}
.tl-card-sub{font-size:11px;color:var(--text2);margin-top:2px}

/* ===== FAB + ADD MODAL ===== */
.fab{
  position:fixed;bottom:76px;right:16px;z-index:100;
  width:52px;height:52px;border-radius:50%;border:none;
  background:var(--blue);color:#0f172a;font-size:28px;font-weight:300;
  box-shadow:0 4px 16px rgba(96,165,250,0.4);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-appearance:none;touch-action:manipulation;
  transition:transform .15s,box-shadow .15s;
}
.fab:active{transform:scale(0.9);box-shadow:0 2px 8px rgba(96,165,250,0.3)}

.add-modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.add-modal-overlay.open{opacity:1;pointer-events:auto}
.add-modal{
  position:fixed;bottom:0;left:0;right:0;z-index:301;
  background:var(--surface-1);border-top-left-radius:16px;border-top-right-radius:16px;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  padding:16px;padding-bottom:calc(16px + env(safe-area-inset-bottom,0px));
  max-height:80vh;overflow-y:auto;
}
.add-modal.open{transform:translateY(0)}
.add-modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.add-tabs{display:flex;gap:4px;margin-bottom:12px;background:var(--surface-0);border-radius:8px;padding:3px}
.add-tab{
  flex:1;padding:8px;border:none;background:none;color:var(--text3);
  font-size:12px;font-weight:600;border-radius:6px;cursor:pointer;
}
.add-tab.active{background:var(--surface-3);color:var(--text)}
.add-tab-content{display:none}
.add-tab-content.active{display:block}
.add-input{
  width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface-0);color:var(--text);font-size:14px;margin-bottom:8px;
  font-family:inherit;resize:none;
}
.add-input::placeholder{color:var(--text3)}
.add-input:focus{outline:none;border-color:var(--blue)}
.add-select{
  padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface-0);color:var(--text);font-size:13px;
  font-family:inherit;flex:1;-webkit-appearance:none;
}
.add-row{display:flex;gap:8px;margin-bottom:8px}
.add-submit{
  width:100%;padding:12px;border:none;border-radius:var(--radius-sm);
  background:var(--blue);color:#0f172a;font-size:14px;font-weight:600;
  cursor:pointer;margin-top:8px;
}
.add-submit:active{opacity:0.8}
.add-hint{font-size:11px;color:var(--text3);margin-top:8px;text-align:center}
.search-result{
  display:flex;align-items:center;gap:10px;padding:12px;
  background:var(--surface-0);border:1px solid var(--border-subtle);
  border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;
  transition:background .15s;
}
.search-result:active{background:var(--surface-2)}
.sr-photo{width:48px;height:48px;border-radius:8px;object-fit:cover;background:var(--surface-2);flex-shrink:0}
.sr-info{flex:1;min-width:0}
.sr-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-addr{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-meta{display:flex;gap:6px;margin-top:2px;font-size:11px;color:var(--text2)}
.sr-rating{color:var(--amber)}
.sr-add{flex-shrink:0;color:var(--blue);font-size:20px;font-weight:300}

/* ===== PLACE DETAIL BOTTOM SHEET ===== */
.place-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--surface-1);border-top-left-radius:16px;border-top-right-radius:16px;
  box-shadow:0 -4px 32px rgba(0,0,0,0.5);
  transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1),height .35s cubic-bezier(.4,0,.2,1);
  max-height:92vh;overflow:hidden;
}
.place-sheet.open{transform:translateY(0)}
.place-sheet.dragging{transition:none}
.sheet-handle{padding:10px 0 6px;text-align:center;cursor:grab;touch-action:none}
.sheet-handle-bar{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.2);margin:0 auto}
.sheet-content{overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom,16px)}

/* Photo carousel */
.sheet-photos{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;gap:4px;scrollbar-width:none;padding:0 16px 12px}
.sheet-photos::-webkit-scrollbar{display:none}
.sheet-photo{flex-shrink:0;width:85%;scroll-snap-align:center;border-radius:12px;aspect-ratio:3/2;object-fit:cover;background:var(--surface-2)}
.sheet-photo:first-child{width:85%}
.sheet-dots{display:flex;justify-content:center;gap:4px;padding:0 0 8px}
.sheet-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2)}
.sheet-dot.active{background:var(--blue)}

/* Sheet header */
.sheet-header{padding:0 16px 8px}
.sheet-name{font-size:20px;font-weight:700;line-height:1.3}
.sheet-meta{display:flex;align-items:center;gap:8px;margin-top:4px;font-size:13px;color:var(--text2)}
.sheet-rating{display:flex;align-items:center;gap:4px;color:var(--amber)}
.sheet-rating-num{font-weight:700;color:var(--text)}
.sheet-reviews{color:var(--text3)}
.sheet-status{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.sheet-status.open-now{background:rgba(52,211,153,0.12);color:var(--green)}
.sheet-status.closed{background:rgba(248,113,113,0.12);color:var(--red)}
.sheet-category{color:var(--text3);font-size:12px}

/* Action buttons row */
.sheet-actions{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
.sheet-actions::-webkit-scrollbar{display:none}
.sheet-action{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 16px;border-radius:12px;border:1px solid var(--border);
  background:var(--surface-2);color:var(--text2);font-size:11px;font-weight:500;
  cursor:pointer;min-width:64px;text-decoration:none;
  -webkit-appearance:none;touch-action:manipulation;
}
.sheet-action:active{background:var(--surface-3)}
.sheet-action.primary{background:var(--blue);color:#0f172a;border-color:var(--blue);font-weight:600}
.sheet-action .sa-icon{font-size:18px}

/* Info section */
.sheet-info{padding:8px 16px 16px}
.sheet-info-row{
  display:flex;align-items:flex-start;gap:12px;padding:12px 0;
  border-bottom:1px solid var(--border-subtle);font-size:13px;color:var(--text2);
}
.sheet-info-row:last-child{border-bottom:none}
.sheet-info-icon{width:18px;flex-shrink:0;text-align:center;color:var(--text3)}
.sheet-info-row a{color:var(--blue);text-decoration:none;word-break:break-all}

/* Hours accordion */
.sheet-hours-toggle{background:none;border:none;color:inherit;font:inherit;cursor:pointer;display:flex;align-items:center;gap:6px;padding:0}
.sheet-hours-toggle .chevron{transition:transform .2s;font-size:10px}
.sheet-hours-toggle[aria-expanded="true"] .chevron{transform:rotate(180deg)}
.sheet-hours-full{padding:6px 0 0 30px}
.sheet-hours-day{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;color:var(--text3)}
.sheet-hours-day.today{font-weight:600;color:var(--text)}

/* Baby badge in sheet */
.sheet-baby{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:10px;background:rgba(52,211,153,0.1);color:var(--green);font-size:11px;font-weight:500;margin-top:8px}

/* Sheet overlay */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:199;opacity:0;pointer-events:none;transition:opacity .3s}
.sheet-overlay.open{opacity:1;pointer-events:auto}

/* Scrollbar */
::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>
<div class="safe-top"></div>

<!-- DAILY VIEW -->

<script>
// Register service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

let TRIP = null;
let currentDay = 0;
let touchStartX = 0;
let touchDeltaX = 0;
let isDragging = false;
const SWIPE_THRESHOLD = 50;

// Load data
fetch('trip.json').then(r=>r.json()).then(data=>{
  TRIP = data;
  init();
}).catch(()=>{
  document.getElementById('swipe-track').innerHTML='<div class="day-panel" style="display:flex;align-items:center;justify-content:center"><p style="color:var(--text3)">Could not load trip data.</p></div>';
});

function init(){
  loadUserAdditions(); // Restore user-added places from localStorage
  buildDots();
  buildAllPanels();
  buildBookings();
  buildStatus();
  buildTips();
  setupNav();
  setupSwipe();
  goToDay(0, false);
  requestNotifications();
  scheduleReminders();
}

// Format date
function fmtDate(str){
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}
function fmtShort(str){
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function fmtTime(t){
  if(!t) return '';
  const [h,m] = t.split(':').map(Number);
  const ampm = h>=12?'PM':'AM';
  const hr = h%12||12;
  return `${hr}:${m.toString().padStart(2,'0')} ${ampm}`;
}

// Build day chips (replaces dots)
function buildDots(){
  const el = document.getElementById('day-chips');
  el.innerHTML = TRIP.days.map((day,i)=>{
    const city = day.location.city.split(',')[0];
    const label = day.day_type === 'transfer' ? 'Transfer' : city;
    return `<div class="day-chip ${day.day_type}" data-i="${i}">Day ${day.day_number} — ${label}</div>`;
  }).join('');

function renderDay(day){
  let html = '';

  // Transport badge
  if(day.transport_mode){
    const tm = day.transport_mode === 'transit' ? '🚇 Public Transit' : '🚗 Rental Car';
    html += `<div class="transport-badge">${tm}</div>`;
  }

  // TRANSFER day structure
  if(day.day_type === 'transfer'){
    // AM: checkout
    if(day.checkout){
      html += `<div class="transfer-label"><span class="tl-badge tl-am">AM</span><span class="tl-text">Checkout</span></div>`;
      html += renderCheckout(day.checkout);
    }
    // MID: flight
    if(day.flights && day.flights.length){
      html += `<div class="transfer-label"><span class="tl-badge tl-mid">MID</span><span class="tl-text">Flight</span></div>`;
      day.flights.forEach(f => html += renderFlight(f));
    }
    // Car rental on May 7
    if(day.car_rental && day.car_rental.active){
      html += renderCarRental(day.car_rental);
    }
    // PM: checkin
    if(day.checkin){
      html += `<div class="transfer-label"><span class="tl-badge tl-pm">PM</span><span class="tl-text">Check In</span></div>`;
      html += renderCheckin(day.checkin);
    }

    // Notes
    if(day.notes && day.notes.length){
      html += renderNotes(day.notes);
    }
    return html;
  }

  // TRAVEL day
  if(day.day_type === 'travel'){
    // Checkout if exists (May 17)
    if(day.checkout){
      html += renderCheckout(day.checkout);
    }
    // Flights
    if(day.flights && day.flights.length){
      day.flights.forEach(f => html += renderFlight(f));
    }
    if(day.notes && day.notes.length){
      html += renderNotes(day.notes);
    }
    return html;
  }

  // STAY day — baby clock first
  html += renderBabyClock(TRIP.days.indexOf(day));

  if(day.accommodation){
    html += renderAccommodation(day.accommodation);
    // Baby amenities
    if(day.accommodation.baby_amenities && day.accommodation.baby_amenities.length){
      html += renderBabyAmenities(day.accommodation);
    }
  }
  // Car rental badge
  if(day.car_rental && day.car_rental.active){
    html += `<div class="card" style="padding:12px">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="card-icon car">🚗</div>
        <div><div style="font-size:13px;font-weight:600">Rental Car Active</div>
        <div style="font-size:11px;color:var(--text2)">Expedia #${day.car_rental.confirmation}</div></div>
      </div></div>`;
  }

  // Activities & restaurants (real data or placeholders)
  html += renderActivities(day.activities);
  html += renderRestaurants(day.restaurants);

  if(day.notes && day.notes.length){
    html += renderNotes(day.notes);
  }
  return html;
}

// Navigate days
function goToDay(i, animate){
  if(i < 0 || i >= TRIP.days.length) return;
  currentDay = i;
  const day = TRIP.days[i];

  // Update header
  document.getElementById('hdr-date').textContent = fmtDate(day.date);
  const locText = day.location.emoji + ' ' + day.location.city + ', ' + day.location.country;
  document.getElementById('hdr-loc').textContent = locText;

  const badge = document.getElementById('hdr-badge');
  badge.textContent = dayBadgeText(day);
  badge.className = 'day-badge badge-' + day.day_type;

  // Move track
  const track = document.getElementById('swipe-track');
  track.style.transition = animate ? 'transform .3s cubic-bezier(.4,0,.2,1)' : 'none';
  track.style.transform = `translateX(-${i * 100}%)`;

  updateDots();

  // Update nav buttons
  document.getElementById('btn-prev').style.visibility = i === 0 ? 'hidden' : 'visible';
  document.getElementById('btn-next').style.visibility = i === TRIP.days.length-1 ? 'hidden' : 'visible';

  // Refresh tips for new destination
  if(document.getElementById('view-tips').classList.contains('active')) buildTips();
}

function dayBadgeText(day){
  const icons = {travel:'✈️',stay:'🏠',transfer:'🔄'};
  const labels = {travel:'Travel',stay:'Stay',transfer:'Transfer'};
  return `${icons[day.day_type]} ${labels[day.day_type]} \u2022 Day ${day.day_number} of ${TRIP.trip.total_days}`;
}

// Navigation
function setupNav(){
  document.getElementById('btn-prev').addEventListener('click', ()=> goToDay(currentDay-1, true));
  document.getElementById('btn-next').addEventListener('click', ()=> goToDay(currentDay+1, true));

  // Tab nav with view transitions
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', ()=>{
      const v = tab.dataset.view;
      const switchView = () => {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.getElementById('view-'+v).classList.add('active');
        if (v === 'tips') buildTips();
      };
      if (document.startViewTransition) {
        document.startViewTransition(switchView);
      } else {
        switchView();
      }
    });
  });
}

// Swipe handling
function setupSwipe(){
  const container = document.getElementById('swipe-container');
  const track = document.getElementById('swipe-track');

  container.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchDeltaX = 0;
    isDragging = true;
    track.style.transition = 'none';
  }, {passive:true});

  container.addEventListener('touchmove', e => {
    if(!isDragging) return;
    touchDeltaX = e.touches[0].clientX - touchStartX;
    // Resist at edges
    if((currentDay === 0 && touchDeltaX > 0) || (currentDay === TRIP.days.length-1 && touchDeltaX < 0)){
      touchDeltaX *= 0.3;
    }
    const offset = -(currentDay * container.offsetWidth) + touchDeltaX;
    track.style.transform = `translateX(${offset}px)`;
  }, {passive:true});

  container.addEventListener('touchend', () => {
    if(!isDragging) return;
    isDragging = false;
    if(touchDeltaX < -SWIPE_THRESHOLD && currentDay < TRIP.days.length-1){
      goToDay(currentDay+1, true);
    } else if(touchDeltaX > SWIPE_THRESHOLD && currentDay > 0){
      goToDay(currentDay-1, true);
    } else {
      goToDay(currentDay, true);
    }
  }, {passive:true});

  // Keyboard
  document.addEventListener('keydown', e => {
    if(e.key === 'ArrowRight') goToDay(currentDay+1, true);
    if(e.key === 'ArrowLeft') goToDay(currentDay-1, true);
  });
}

function getDestination(dayIdx) {
  const day = TRIP.days[dayIdx];
  const city = day.location.city.toLowerCase();
  if (city.includes('vienna') || city.includes('wien')) return 'vienna';
  if (city.includes('crete') || city.includes('elounda') || city.includes('agios') || city.includes('heraklion')) return 'crete';
  if (city.includes('zurich') || city.includes('zürich')) return 'zurich';
  return null;
}

function copyPhrase(text) {
  // Strip parenthetical romanization for clean copy
  const clean = text.replace(/\s*\(.*?\)\s*/g, '');
  navigator.clipboard.writeText(clean).then(() => {
    showToast('Copied!', clean);
  }).catch(() => {});
}

// ===== BABY TIME ZONE HELPER =====
function renderBabyClock(dayIdx) {
  const day = TRIP.days[dayIdx];
  const city = day.location.city;
  if (city === 'Chicago') return '';

  // CDT (UTC-5) to CEST (UTC+2) = +7h, EEST (UTC+3) = +8h
  const dest = getDestination(dayIdx);
  const offset = (dest === 'crete') ? 8 : 7;
  const tzName = (dest === 'crete') ? 'EEST' : 'CEST';

  const slots = [
    {local: 7, label: 'Morning'},
    {local: 9, label: 'Mid-morning'},
    {local: 12, label: 'Lunch'},
    {local: 15, label: 'Afternoon'},
    {local: 18, label: 'Dinner'},
    {local: 20, label: 'Bedtime'}
  ];

  let html = `<div class="baby-clock"><div class="baby-clock-title">👶 Owen's Body Clock (CDT → ${tzName})</div>`;
  html += `<div class="baby-clock-grid">`;
  slots.forEach(s => {
    let bodyHour = ((s.local - offset) % 24 + 24) % 24;
    const fmtLocal = s.local > 12 ? (s.local-12)+'PM' : s.local+'AM';
    const fmtBody = bodyHour > 12 ? (bodyHour-12)+'PM' : (bodyHour===0?'12AM':bodyHour+'AM');
    // Categorize by Owen's body clock
    let cls = 'awake';
    if (bodyHour >= 19 || bodyHour < 6) cls = 'sleeping';
    else if (bodyHour >= 12 && bodyHour <= 14) cls = 'nap';
    html += `<div class="baby-clock-item ${cls}">
      <div class="bcl-local">${fmtLocal}</div>
      <div class="bcl-body">Owen: ${fmtBody}</div>
      <div class="bcl-label">${cls === 'sleeping' ? '💤 Sleep time' : cls === 'nap' ? '😴 Nap window' : '☀️ Awake'}</div>
    </div>`;
  });
  html += `</div></div>`;
  return html;
}

// ===== NOTIFICATIONS & REMINDERS =====
let toastTimeout = null;
function showToast(title, body) {
  let toast = document.getElementById('app-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'app-toast';
    toast.className = 'toast';
    document.body.appendChild(toast);
  }
  toast.innerHTML = `<div class="toast-title">${title}</div><div class="toast-body">${body}</div>`;
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('show'), 4000);
}

function scheduleReminders() {
  if (!TRIP) return;
  const now = new Date();

  TRIP.days.forEach(day => {
    // Flight check-in reminders (T-24h)
    if (day.flights) {
      day.flights.forEach(f => {
        const depart = new Date(f.depart_date + 'T' + f.depart_time + ':00');
        const checkIn = new Date(depart.getTime() - 24 * 60 * 60 * 1000);
        const msUntil = checkIn.getTime() - now.getTime();
        if (msUntil > 0 && msUntil < 7 * 24 * 60 * 60 * 1000) {
          setTimeout(() => {
            notifyUser(`✈️ Check-in Open`, `${f.airline} ${f.flight_number}: ${f.from.code} → ${f.to.code}. Check in now!`);
          }, msUntil);
        }
      });
    }
    // Checkout reminders (8AM on checkout day)
    if (day.checkout) {
      const co = new Date(day.date + 'T08:00:00');
      const msUntil = co.getTime() - now.getTime();
      if (msUntil > 0 && msUntil < 7 * 24 * 60 * 60 * 1000) {
        setTimeout(() => {
          notifyUser(`🏨 Checkout Today`, `${day.checkout.property} — checkout by ${day.checkout.time || 'morning'}`);
        }, msUntil);
      }
    }
  });
}

function notifyUser(title, body) {
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body, icon: 'manifest.json' });
  }
  showToast(title, body);
}

function requestNotifications() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

// ===== TIMELINE VIEW =====
let viewMode = 'cards';

function renderTimeline(day) {
  let events = [];

  // Collect timed events
  if (day.checkout) {
    events.push({time: day.checkout.time || '10:00', title: `Checkout: ${day.checkout.property}`, type: 'checkout'});
  }
  if (day.flights) {
    day.flights.forEach(f => {
      events.push({time: f.depart_time, title: `${f.airline} ${f.flight_number}`, sub: `${f.from.code} → ${f.to.code}`, type: 'flight'});
    });
  }
  if (day.checkin) {
    events.push({time: day.checkin.time || '15:00', title: `Check in: ${day.checkin.property}`, type: 'checkin'});
  }
  if (day.accommodation && day.day_type === 'stay') {
    events.push({time: '09:00', title: day.accommodation.name, sub: `Night ${day.accommodation.night_n} of ${day.accommodation.total_nights}`, type: 'hotel'});
  }
  if (day.activities) {
    day.activities.forEach(a => {
      events.push({time: a.suggested_time || '10:00', title: a.name, sub: a.duration ? `${a.duration} · ${a.cost || 'Free'}` : '', type: 'activity'});
    });
  }
  if (day.restaurants) {
    day.restaurants.forEach(r => {
      events.push({time: r.suggested_time || '12:00', title: r.name, sub: r.cuisine ? `${r.cuisine} · ${r.price_range || ''}` : '', type: 'restaurant'});
    });
  }
  if (day.car_rental && day.car_rental.active) {
    events.push({time: '08:00', title: `🚗 ${day.car_rental.provider || 'Rental Car'}`, sub: day.car_rental.notes || '', type: 'transport'});
  }

  // Sort by time
  events.sort((a, b) => a.time.localeCompare(b.time));

  if (events.length === 0) {
    return `<div style="text-align:center;padding:40px;color:var(--text3)">No timed events for this day</div>`;
  }

  let html = `<div class="timeline-rail">`;
  events.forEach(e => {
    const fmtT = fmtTime(e.time);
    html += `<div class="tl-event ${e.type}">
      <div class="tl-time">${fmtT}</div>
      <div class="tl-card">
        <div class="tl-card-title">${e.title}</div>
        ${e.sub ? `<div class="tl-card-sub">${e.sub}</div>` : ''}
      </div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

let _searchResults = [];

async function searchPlaces() {
  const query = document.getElementById('search-query').value.trim();
  if (!query) { showToast('Error', 'Enter a search term'); return; }

  const btn = document.getElementById('search-btn');
  btn.textContent = 'Searching...';
  btn.disabled = true;

  // Get current day's city for location bias
  const dayIdx = parseInt(document.getElementById('search-day').value);
  const day = TRIP.days[dayIdx];
  const lat = day.location ? (day.location.lat || 48.2) : 48.2;
  const lng = day.location ? (day.location.lng || 16.37) : 16.37;

  // Use current accommodation coords if available
  let biasLat = lat, biasLng = lng;
  if (day.accommodation && day.accommodation.lat) {
    biasLat = day.accommodation.lat; biasLng = day.accommodation.lng;
  }
  // Try to get from COORDS
  const dest = getDestination(dayIdx);
  if (dest && COORDS && COORDS.accommodations && COORDS.accommodations[dest]) {
    biasLat = COORDS.accommodations[dest].lat;
    biasLng = COORDS.accommodations[dest].lng;
  }

  try {
    const body = JSON.stringify({
      textQuery: query,
      locationBias: { circle: { center: { latitude: biasLat, longitude: biasLng }, radius: 15000.0 } },
      maxResultCount: 5
    });
    const resp = await fetch('https://places.googleapis.com/v1/places:searchText', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Goog-Api-Key': GPLACES_KEY,
        'X-Goog-FieldMask': 'places.displayName,places.rating,places.userRatingCount,places.formattedAddress,places.location,places.googleMapsUri,places.websiteUri,places.nationalPhoneNumber,places.regularOpeningHours,places.photos,places.priceLevel,places.primaryType'
      },
      body
    });
    const data = await resp.json();
    _searchResults = (data.places || []).map(p => ({
      name: p.displayName ? p.displayName.text : 'Unknown',
      address: p.formattedAddress || '',
      lat: p.location ? p.location.latitude : 0,
      lng: p.location ? p.location.longitude : 0,
      google_rating: p.rating || null,
      google_review_count: p.userRatingCount || 0,
      website: p.websiteUri || '',
      phone: p.nationalPhoneNumber || '',
      google_maps_url: p.googleMapsUri || '',
      google_price_level: p.priceLevel || '',
      google_hours: p.regularOpeningHours ? p.regularOpeningHours.weekdayDescriptions : null,
      photo_urls: (p.photos || []).slice(0, 3).map(ph => `https://places.googleapis.com/v1/${ph.name}/media?maxHeightPx=400&maxWidthPx=600`),
      primaryType: p.primaryType || ''
    }));

    renderSearchResults();
  } catch(e) {
    showToast('Search Error', e.message);
  }
  btn.textContent = 'Search Google Places';
  btn.disabled = false;
}

function renderSearchResults() {
  const el = document.getElementById('search-results');
  if (_searchResults.length === 0) {
    el.innerHTML = '<div class="add-hint">No results found. Try a different search term.</div>';
    return;
  }
  el.innerHTML = _searchResults.map((r, i) => {
    const photoUrl = r.photo_urls[0] ? photoUrl_fn(r.photo_urls[0]) : '';
    const photoHtml = photoUrl ? `<img class="sr-photo" src="${photoUrl}" alt="" onerror="this.style.display='none'">` : `<div class="sr-photo" style="display:flex;align-items:center;justify-content:center;font-size:20px">📍</div>`;
    return `<div class="search-result" onclick="addSearchResult(${i})">
      ${photoHtml}
      <div class="sr-info">
        <div class="sr-name">${r.name}</div>
        <div class="sr-addr">${r.address}</div>
        <div class="sr-meta">
          ${r.google_rating ? `<span class="sr-rating">★ ${r.google_rating}</span>` : ''}
          ${r.google_review_count ? `<span>(${r.google_review_count.toLocaleString()})</span>` : ''}
          ${r.primaryType ? `<span>${r.primaryType.replace(/_/g,' ')}</span>` : ''}
        </div>
      </div>
      <span class="sr-add">+</span>
    </div>`;
  }).join('');
}

// Helper to avoid name collision with openSheet's photoUrl
function photoUrl_fn(url) {
  if (!url) return '';

function addSearchResult(idx) {
  const r = _searchResults[idx];
  const dayIdx = parseInt(document.getElementById('search-day').value);

  const item = {
    name: r.name,
    type: r.primaryType && r.primaryType.includes('restaurant') ? 'restaurant' : 'activity',
    subtype: r.primaryType ? r.primaryType.replace(/_/g, ' ') : 'place',
    lat: r.lat, lng: r.lng,
    address: r.address,
    google_rating: r.google_rating,
    google_review_count: r.google_review_count,
    website: r.website,
    phone: r.phone,
    google_maps_url: r.google_maps_url,
    google_price_level: r.google_price_level,
    google_hours: r.google_hours,
    photo_urls: r.photo_urls,
    description: '',
    baby_friendly: true,
    baby_notes: '',
    tags: ['user-added', 'google-search'],
    _userAdded: true
  };

  const category = item.type === 'restaurant' ? 'restaurants' : 'activities';
  if (!TRIP.days[dayIdx][category]) TRIP.days[dayIdx][category] = [];
  TRIP.days[dayIdx][category].push(item);

  saveUserAdditions();
  buildAllPanels();
  goToDay(dayIdx, false);
  closeAddModal();
  showToast('Added!', `${r.name} added to Day ${TRIP.days[dayIdx].day_number} with full Google data`);
}

function saveUserAdditions() {
  // Save user-added items to localStorage
  const userItems = [];
  TRIP.days.forEach((day, i) => {
    ['activities', 'restaurants'].forEach(cat => {
      (day[cat] || []).forEach(item => {
        if (item._userAdded) {
          userItems.push({ dayIdx: i, category: cat, item: item });
        }
      });
    });
  });
  try { localStorage.setItem('trip_user_additions', JSON.stringify(userItems)); } catch(e) {}
}

function loadUserAdditions() {
  try {
    const saved = JSON.parse(localStorage.getItem('trip_user_additions') || '[]');
    saved.forEach(({ dayIdx, category, item }) => {
      if (TRIP.days[dayIdx]) {
        if (!TRIP.days[dayIdx][category]) TRIP.days[dayIdx][category] = [];
        // Avoid duplicates
        if (!TRIP.days[dayIdx][category].some(x => x.name === item.name && x._userAdded)) {
          TRIP.days[dayIdx][category].push(item);
        }
      }
    });
  } catch(e) {}
}

let sheetOpen = false;
let sheetDragging = false;
let sheetStartY = 0;
let sheetStartH = 0;
let sheetVelocity = 0;
let sheetLastY = 0;
let sheetLastTime = 0;

function initSheet() {
  const sheet = document.getElementById('place-sheet');
  const handle = document.getElementById('sheet-handle');
  const overlay = document.getElementById('sheet-overlay');

  handle.addEventListener('pointerdown', e => {
    sheetDragging = true;
    sheetStartY = e.clientY;
    sheetStartH = sheet.getBoundingClientRect().height;
    sheetLastY = e.clientY;
    sheetLastTime = Date.now();
    sheetVelocity = 0;
    sheet.classList.add('dragging');
    handle.setPointerCapture(e.pointerId);
  });

  window.addEventListener('pointermove', e => {
    if (!sheetDragging) return;
    const deltaY = sheetStartY - e.clientY;
    const newH = Math.max(80, Math.min(window.innerHeight * 0.92, sheetStartH + deltaY));
    const now = Date.now();
    const dt = now - sheetLastTime;
    if (dt > 0) sheetVelocity = (sheetLastY - e.clientY) / dt;
    sheetLastY = e.clientY;
    sheetLastTime = now;
    sheet.style.height = newH + 'px';
  });

  window.addEventListener('pointerup', e => {
    if (!sheetDragging) return;
    sheetDragging = false;
    sheet.classList.remove('dragging');
    const vh = window.innerHeight;
    const currentH = sheet.getBoundingClientRect().height;
    const frac = currentH / vh;

    if (sheetVelocity < -0.4 || frac < 0.12) {
      closeSheet();
    } else if (sheetVelocity > 0.4 || frac > 0.7) {
      sheet.style.height = '92vh';
    } else if (frac > 0.35) {
      sheet.style.height = '55vh';
    } else {
      sheet.style.height = '40vh';
    }
  });

  overlay.addEventListener('click', closeSheet);
}

function photoUrl(url) {
  if (!url) return '';
  // Append API key at runtime if not present
  if (url.includes('places.googleapis.com') && !url.includes('key=')) {
    return url + (url.includes('?') ? '&' : '?') + 'key=' + GPLACES_KEY;
  }
  return url;
}

function openSheet(item) {
  const sheet = document.getElementById('place-sheet');
  const content = document.getElementById('sheet-content');
  const overlay = document.getElementById('sheet-overlay');

  let html = '';

  // Photo carousel
  const photos = item.photo_urls || [];
  if (photos.length) {
    html += `<div class="sheet-photos">`;
    photos.forEach(url => {
      html += `<img class="sheet-photo" src="${photoUrl(url)}" alt="" loading="lazy" onerror="this.style.display='none'">`;
    });
    html += `</div>`;
    if (photos.length > 1) {
      html += `<div class="sheet-dots">${photos.map((_,i) => `<div class="sheet-dot${i===0?' active':''}"></div>`).join('')}</div>`;
    }
  }

  // Header
  html += `<div class="sheet-header">`;
  html += `<div class="sheet-name">${item.name}</div>`;
  html += `<div class="sheet-meta">`;
  if (item.google_rating) {
    const stars = '★'.repeat(Math.round(item.google_rating)) + '☆'.repeat(5 - Math.round(item.google_rating));
    html += `<span class="sheet-rating"><span class="sheet-rating-num">${item.google_rating}</span> <span style="font-size:11px">${stars}</span></span>`;
    if (item.google_review_count) html += `<span class="sheet-reviews">(${item.google_review_count.toLocaleString()})</span>`;
  }
  if (item.google_price_level) {
    const priceMap = {PRICE_LEVEL_INEXPENSIVE:'$',PRICE_LEVEL_MODERATE:'$$',PRICE_LEVEL_EXPENSIVE:'$$$',PRICE_LEVEL_VERY_EXPENSIVE:'$$$$'};
    html += `<span>${priceMap[item.google_price_level] || ''}</span>`;
  }
  html += `</div>`;
  html += `<div class="sheet-category">${item.cuisine || item.subtype || item.type}</div>`;
  if (item.baby_friendly) {
    html += `<div class="sheet-baby">👶 Baby-friendly${item.baby_notes ? ' — ' + item.baby_notes : ''}</div>`;
  }
  html += `</div>`;

  // Action buttons
  const dirUrl = `https://www.google.com/maps/dir/?api=1&destination=${item.lat},${item.lng}`;
  html += `<div class="sheet-actions">`;
  html += `<a class="sheet-action primary" href="${dirUrl}" target="_blank"><span class="sa-icon">🧭</span>Directions</a>`;
  if (item.phone) html += `<a class="sheet-action" href="tel:${item.phone}"><span class="sa-icon">📞</span>Call</a>`;
  if (item.website) html += `<a class="sheet-action" href="${item.website}" target="_blank"><span class="sa-icon">🌐</span>Website</a>`;
  if (item.google_maps_url) html += `<a class="sheet-action" href="${item.google_maps_url}" target="_blank"><span class="sa-icon">🗺️</span>Google Maps</a>`;
  html += `<button class="sheet-action" onclick="showOnMap(${item.lat},${item.lng},'${item.name.replace(/'/g,"\\'")}','${item.type}');closeSheet()"><span class="sa-icon">📍</span>Map</button>`;
  html += `</div>`;

  // Info rows
  html += `<div class="sheet-info">`;
  if (item.address) html += `<div class="sheet-info-row"><span class="sheet-info-icon">📍</span><span>${item.address}</span></div>`;

  // Hours
  if (item.google_hours && item.google_hours.length) {
    const today = new Date().getDay();
    const todayIdx = today === 0 ? 6 : today - 1; // Google uses Mon=0
    html += `<div class="sheet-info-row"><span class="sheet-info-icon">🕐</span><div>`;
    html += `<button class="sheet-hours-toggle" aria-expanded="false" onclick="this.setAttribute('aria-expanded',this.getAttribute('aria-expanded')==='true'?'false':'true');this.nextElementSibling.style.display=this.getAttribute('aria-expanded')==='true'?'block':'none'">`;
    html += `<span>${item.google_hours[todayIdx] || 'See hours'}</span> <span class="chevron">▼</span></button>`;
    html += `<div class="sheet-hours-full" style="display:none">`;
    item.google_hours.forEach((h, i) => {
      html += `<div class="sheet-hours-day${i === todayIdx ? ' today' : ''}">${h}</div>`;
    });
    html += `</div></div></div>`;
  } else if (item.hours) {
    html += `<div class="sheet-info-row"><span class="sheet-info-icon">🕐</span><span>${item.hours}</span></div>`;
  }

  if (item.phone) html += `<div class="sheet-info-row"><span class="sheet-info-icon">📞</span><a href="tel:${item.phone}">${item.phone}</a></div>`;
  if (item.website) html += `<div class="sheet-info-row"><span class="sheet-info-icon">🌐</span><a href="${item.website}" target="_blank">${item.website.replace(/^https?:\/\/(www\.)?/,'').slice(0,40)}...</a></div>`;
  if (item.cost || item.price_range) html += `<div class="sheet-info-row"><span class="sheet-info-icon">💰</span><span>${item.cost || item.price_range}</span></div>`;
  if (item.duration) html += `<div class="sheet-info-row"><span class="sheet-info-icon">⏱️</span><span>${item.duration}</span></div>`;
  if (item.description) html += `<div class="sheet-info-row"><span class="sheet-info-icon">📝</span><span>${item.description}</span></div>`;
  html += `</div>`;

  content.innerHTML = html;

  // Photo scroll dots
  const photosEl = content.querySelector('.sheet-photos');
  if (photosEl && photos.length > 1) {
    const dots = content.querySelectorAll('.sheet-dot');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const idx = Array.from(photosEl.children).indexOf(e.target);
          dots.forEach((d,i) => d.classList.toggle('active', i === idx));
        }
      });
    }, {root: photosEl, threshold: 0.6});
    photosEl.querySelectorAll('.sheet-photo').forEach(img => observer.observe(img));
  }

  sheet.style.height = '55vh';
  sheet.classList.add('open');
  overlay.classList.add('open');
  sheetOpen = true;
}

function closeSheet() {
  const sheet = document.getElementById('place-sheet');
  const overlay = document.getElementById('sheet-overlay');
  sheet.classList.remove('open');
  sheet.style.height = '';
  overlay.classList.remove('open');
  sheetOpen = false;
}

// Map day index -> city key
function getCityForDay(dayIdx) {
  const d = TRIP.days[dayIdx];
  const city = d.location.city.toLowerCase();
  if (city.includes('vienna') || city.includes('wien')) return 'vienna';
  if (city.includes('crete') || city.includes('heraklion') || city.includes('agios')) return 'crete';
  if (city.includes('zurich') || city.includes('z\u00fcrich')) return 'zurich';
  if (city.includes('chicago')) return 'chicago';
  // Transfer days
  if (city.includes('vienna') && city.includes('crete')) return 'transfer_vie_her';
  if (city.includes('crete') && city.includes('zurich')) return 'transfer_her_zrh';
  return null;
}

function getMapConfigForDay(dayIdx) {
  const day = TRIP.days[dayIdx];
  const dt = day.day_type;
  const city = getCityForDay(dayIdx);

  if (dt === 'stay') {
    let accomKey, poisKey;
    if (city === 'vienna') { accomKey = 'vienna'; poisKey = 'vienna'; }
    else if (city === 'crete') { accomKey = 'crete'; poisKey = 'crete'; }
    else if (city === 'zurich') { accomKey = 'zurich'; poisKey = 'zurich'; }
    else return null;
    const accom = COORDS.accommodations[accomKey];
    // Build POIs from trip.json activities + restaurants for this day
    const dayData = TRIP.days[dayIdx];
    const dynamicPois = [];
    if (dayData.activities) {
      dayData.activities.forEach(a => {
        if (a.lat && a.lng) dynamicPois.push({lat:a.lat, lng:a.lng, name:a.name, type: a.subtype === 'beach' ? 'beach' : 'activity', _source: a});
      });
    }
    if (dayData.restaurants) {
      dayData.restaurants.forEach(r => {
        if (r.lat && r.lng) dynamicPois.push({lat:r.lat, lng:r.lng, name:r.name, type:'restaurant', _source: r});
      });
    }
    // Fallback to hardcoded POIs if no dynamic data
    const pois = dynamicPois.length > 0 ? dynamicPois : (COORDS.pois[poisKey] || []);
    return {
      type: 'stay',
      center: [accom.lng, accom.lat],
      zoom: poisKey === 'crete' ? 11 : 12,
      accommodation: accom,
      pois: pois
    };
  }

  if (dt === 'transfer') {
    // May 7: Vienna -> VIE -> HER -> Daios Cove
    if (dayIdx === 4) {
      return {
        type: 'transfer',
        segments: [
          { from: COORDS.accommodations.vienna, to: COORDS.airports.VIE, mode: 'ground' },
          { from: COORDS.airports.VIE, to: COORDS.airports.HER, mode: 'flight' },

        accommodations: [COORDS.accommodations.vienna, COORDS.accommodations.crete]
      };
    }
    // May 14: Daios Cove -> HER -> ZRH -> Radisson
    if (dayIdx === 11) {
      return {
        type: 'transfer',
        segments: [
          { from: COORDS.accommodations.crete, to: COORDS.airports.HER, mode: 'ground' },
          { from: COORDS.airports.HER, to: COORDS.airports.ZRH, mode: 'flight' },
          { from: COORDS.airports.ZRH, to: COORDS.accommodations.zurich, mode: 'ground' }
        ],
        airports: [COORDS.airports.HER, COORDS.airports.ZRH],
        accommodations: [COORDS.accommodations.crete, COORDS.accommodations.zurich]
      };
    }
    return null;
  }

  if (dt === 'travel') {
    // May 3: ORD -> VIE
    if (dayIdx === 0) {
      return {
        type: 'travel',
        segments: [
          { from: COORDS.airports.ORD, to: COORDS.airports.VIE, mode: 'flight' }
        ],
        airports: [COORDS.airports.ORD, COORDS.airports.VIE]
      };

    // May 17: ZRH -> ORD

      return {
        type: 'travel',
        segments: [
          { from: COORDS.airports.ZRH, to: COORDS.airports.ORD, mode: 'flight' }
        ],
        airports: [COORDS.airports.ZRH, COORDS.airports.ORD]
      };
    }
    return null;
  }

  return null;
}

function createMarkerEl(type) {
  const el = document.createElement('div');
  el.className = 'map-marker ' + type;
  const icons = {
    accommodation: '\uD83C\uDFE8',
    activity: '\uD83D\uDCCD',
    restaurant: '\uD83C\uDF7D\uFE0F',
    beach: '\uD83C\uDFD6\uFE0F',
    market: '\uD83D\uDED2',
    airport: '\u2708\uFE0F'
  };
  el.textContent = icons[type] || '\uD83D\uDCCD';
  return el;
}

function makePopupHTML(name, type, lat, lng) {
  const dirUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
  return `<div class="popup-name">${name}</div>
    <span class="popup-type ${type}">${type}</span><br>
    <a class="popup-dir" href="${dirUrl}" target="_blank" rel="noopener">Directions \u2197</a>`;
}

function clearMap() {
  mapMarkers.forEach(m => m.marker.remove());
  mapMarkers = [];
  if (mapPopup) { mapPopup.remove(); mapPopup = null; }
  // Remove route layers/sources
  if (mapInstance) {
    ['route-flight', 'route-ground'].forEach(id => {
      if (mapInstance.getLayer(id)) mapInstance.removeLayer(id);
      if (mapInstance.getSource(id)) mapInstance.removeSource(id);
    });
    // Remove any numbered route sources
    for (let i = 0; i < 10; i++) {
      ['route-flight-' + i, 'route-ground-' + i].forEach(id => {
        if (mapInstance.getLayer(id)) mapInstance.removeLayer(id);
        if (mapInstance.getSource(id)) mapInstance.removeSource(id);
      });
    }
  }
}

function addMarker(lat, lng, name, type, sourceItem) {
  const el = createMarkerEl(type);
  const marker = new mapboxgl.Marker({ element: el })
    .setLngLat([lng, lat])
    .addTo(mapInstance);
  el.addEventListener('click', (e) => {
    e.stopPropagation();
    if (mapPopup) mapPopup.remove();
    // If we have full source data, open the bottom sheet
    if (sourceItem && sourceItem.google_rating) {
      openSheet(sourceItem);
    } else {
      mapPopup = new mapboxgl.Popup({ offset: 20, closeButton: true })
        .setLngLat([lng, lat])
        .setHTML(makePopupHTML(name, type, lat, lng))
        .addTo(mapInstance);
    }
  });
  mapMarkers.push({ marker, type, el });
}

function addRouteLine(from, to, mode, idx) {
  const id = 'route-' + mode + '-' + idx;
  // For flights, create a curved great-circle-ish arc
  const coords = [];
  if (mode === 'flight') {
    const steps = 60;
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const lng = from.lng + t * (to.lng - from.lng);
      const lat = from.lat + t * (to.lat - from.lat);
      // Add arc height
      const arc = Math.sin(t * Math.PI) * Math.abs(to.lng - from.lng) * 0.15;
      coords.push([lng, lat + arc]);
    }
  } else {
    coords.push([from.lng, from.lat]);
    coords.push([to.lng, to.lat]);
  }
  mapInstance.addSource(id, { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } } });
  mapInstance.addLayer({
    id: id,
    type: 'line',
    source: id,
    paint: {
      'line-color': mode === 'flight' ? '#60a5fa' : '#34d399',
      'line-width': mode === 'flight' ? 2.5 : 2,
      'line-dasharray': mode === 'flight' ? [4, 4] : [1]
    }
  });
}

function renderMapForDay(dayIdx) {
  if (!mapInstance) return;
  clearMap();
  const config = getMapConfigForDay(dayIdx);
  if (!config) {
    mapInstance.flyTo({ center: [12, 48], zoom: 3 });
    return;
  }

  if (config.type === 'stay') {
    mapInstance.flyTo({ center: config.center, zoom: config.zoom, duration: 800 });
    // Accommodation marker
    addMarker(config.accommodation.lat, config.accommodation.lng, config.accommodation.name, 'accommodation');
    // POI markers
    config.pois.forEach(p => addMarker(p.lat, p.lng, p.name, p.type, p._source || p));
    applyFilter();
    return;
  }

  if (config.type === 'transfer' || config.type === 'travel') {
    // Fit bounds to all points
    const bounds = new mapboxgl.LngLatBounds();
    if (config.segments) {
      config.segments.forEach((seg, i) => {
        bounds.extend([seg.from.lng, seg.from.lat]);
        bounds.extend([seg.to.lng, seg.to.lat]);
        // defer line add until style ready
        addRouteLine(seg.from, seg.to, seg.mode, i);
      });
    }
    if (config.airports) {
      config.airports.forEach(a => {
        addMarker(a.lat, a.lng, a.name, 'airport');
        bounds.extend([a.lng, a.lat]);
      });
    }
    if (config.accommodations) {
      config.accommodations.forEach(a => {
        addMarker(a.lat, a.lng, a.name, 'accommodation');
        bounds.extend([a.lng, a.lat]);
      });
    }
    mapInstance.fitBounds(bounds, { padding: 60, duration: 800, maxZoom: 8 });
    applyFilter();
    return;
  }
}

function applyFilter() {
  mapMarkers.forEach(m => {
    if (activeFilter === 'all') {
      m.el.style.display = '';
    } else {
      m.el.style.display = (m.type === activeFilter || m.type === 'accommodation' || m.type === 'airport') ? '' : 'none';
    }
  });
}

let drawerCollapsed = false;
let userLatLng = null;

function updateDrawer(dayIdx) {
  const list = document.getElementById('map-drawer-list');
  const count = document.getElementById('drawer-count');
  const day = TRIP.days[dayIdx];
  const items = [];

  if (day.activities) day.activities.forEach(a => {
    if (a.lat && a.lng) items.push({...a, _type: a.subtype === 'beach' ? 'beach' : 'activity', _icon: a.subtype === 'beach' ? '🏖️' : '📍'});
  });
  if (day.restaurants) day.restaurants.forEach(r => {
    if (r.lat && r.lng) items.push({...r, _type: 'restaurant', _icon: '🍽️'});
  });

  count.textContent = items.length ? `${items.length} places` : '';

  if (items.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px">No places for this day</div>';
    return;
  }

  // Sort by distance from user if we have location
  if (userLatLng) {
    items.forEach(item => {
      item._dist = haversine(userLatLng.lat, userLatLng.lng, item.lat, item.lng);
    });
    items.sort((a, b) => a._dist - b._dist);
  }

  list.innerHTML = items.map((item, i) => {
    const distHtml = item._dist != null ? `<span class="drawer-item-dist">${formatDist(item._dist)}</span>` : '';
    const meta = [item.cost || item.price_range, item.duration || item.cuisine].filter(Boolean).join(' · ');
    return `<div class="drawer-item" data-idx="${i}" data-lat="${item.lat}" data-lng="${item.lng}" data-name="${item.name}" data-type="${item._type}">
      <div class="drawer-item-icon ${item._type}">${item._icon}</div>
      <div class="drawer-item-info">
        <div class="drawer-item-name">${item.name}</div>
        <div class="drawer-item-meta">${meta}</div>
      </div>
      ${distHtml}
    </div>`;
  }).join('');
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDist(km) {
  if (km < 1) return Math.round(km * 1000) + 'm';
  return km.toFixed(1) + 'km';
}

function showOnMap(lat, lng, name, type) {
  // Switch to map tab
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.nav-tab[data-view="map"]').classList.add('active');
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-map').classList.add('active');

  setTimeout(() => {
    if (!mapInitialized) {
      initMap();
      mapInstance.on('load', () => {
        mapInstance.flyTo({ center: [lng, lat], zoom: 16, duration: 800 });
        if (mapPopup) mapPopup.remove();
        mapPopup = new mapboxgl.Popup({ offset: 20, closeButton: true })
          .setLngLat([lng, lat])
          .setHTML(makePopupHTML(name, type, lat, lng))
          .addTo(mapInstance);
      });
    } else {
      mapInstance.resize();
      mapInstance.flyTo({ center: [lng, lat], zoom: 16, duration: 800 });
      if (mapPopup) mapPopup.remove();
      mapPopup = new mapboxgl.Popup({ offset: 20, closeButton: true })
        .setLngLat([lng, lat])
        .setHTML(makePopupHTML(name, type, lat, lng))
        .addTo(mapInstance);
    }
    // Collapse drawer so map is visible
    const drawer = document.getElementById('map-drawer');
    if (drawer) { drawerCollapsed = true; drawer.classList.add('collapsed'); }
  }, 100);
}

function setupDrawer() {
  const handle = document.getElementById('map-drawer-handle');
  const drawer = document.getElementById('map-drawer');
  const list = document.getElementById('map-drawer-list');

  handle.addEventListener('click', () => {
    drawerCollapsed = !drawerCollapsed;
    drawer.classList.toggle('collapsed', drawerCollapsed);
  });

  list.addEventListener('click', (e) => {
    const item = e.target.closest('.drawer-item');
    if (!item || !mapInstance) return;
    const lat = parseFloat(item.dataset.lat);
    const lng = parseFloat(item.dataset.lng);
    const name = item.dataset.name;
    const type = item.dataset.type;

    // Fly to marker
    mapInstance.flyTo({ center: [lng, lat], zoom: 15, duration: 800 });

    // Open popup
    if (mapPopup) mapPopup.remove();
    const dirUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
    mapPopup = new mapboxgl.Popup({ offset: 20, closeButton: true })
      .setLngLat([lng, lat])
      .setHTML(makePopupHTML(name, type, lat, lng))
      .addTo(mapInstance);

    // Collapse drawer to show map
    drawerCollapsed = true;
    drawer.classList.add('collapsed');
  });

  // Track user location for distance calc
  if ('geolocation' in navigator) {
    navigator.geolocation.watchPosition(pos => {
      userLatLng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      updateDrawer(currentDay);
    }, () => {}, { enableHighAccuracy: true });
  }
}

function initMap() {
  if (mapInitialized) return;
  mapboxgl.accessToken = MAPBOX_TOKEN;
  mapInstance = new mapboxgl.Map({
    container: 'mapbox-map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [12, 48],
    zoom: 3,
    attributionControl: false
  });
  mapInstance.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'bottom-right');
  mapInstance.addControl(new mapboxgl.GeolocateControl({
    positionOptions: { enableHighAccuracy: true },
    trackUserLocation: true,
    showUserHeading: true
  }), 'bottom-right');
  mapInstance.on('load', () => {
    renderMapForDay(currentDay);
    updateDrawer(currentDay);
  });
  mapInitialized = true;

  // Filter chips
  document.querySelectorAll('#map-filters .map-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('#map-filters .map-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = chip.dataset.filter;
      applyFilter();
    });
  });

  setupDrawer();
}

// Hook into tab switching — attach directly since setupNav() already ran at init
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const v = tab.dataset.view;
    if (v === 'map') {
      setTimeout(() => {
        if (!mapInitialized) {
          initMap();
        } else {
          mapInstance.resize();
          renderMapForDay(currentDay);
          updateDrawer(currentDay);
        }
      }, 50);
    }
  });
});

// Also update map when day changes (patch goToDay)
const _origGoToDay = goToDay;
goToDay = function(i, animate) {
  _origGoToDay(i, animate);
  // If map tab is active, re-render
  if (mapInitialized && document.getElementById('view-map').classList.contains('active')) {
    renderMapForDay(currentDay);
    updateDrawer(currentDay);
  }
};
</script>
