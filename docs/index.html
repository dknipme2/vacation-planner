<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<title>Trip Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Surface elevation (lighter = higher) */
  --surface-0:#0f172a;--surface-1:#141c2e;--surface-2:#182032;--surface-3:#1e293b;
  --surface-glass:rgba(30,41,59,0.75);
  /* Backward-compatible aliases */
  --bg:var(--surface-0);--bg2:var(--surface-3);--card:var(--surface-glass);
  --border:rgba(255,255,255,0.1);--border-subtle:rgba(255,255,255,0.06);
  /* Accent colors */
  --blue:#60a5fa;--green:#34d399;--amber:#fbbf24;--red:#f87171;--purple:#a855f7;
  /* Semantic colors */
  --color-success:#34d399;--color-success-muted:rgba(52,211,153,0.12);
  --color-warning:#fbbf24;--color-warning-muted:rgba(251,191,36,0.12);
  --color-error:#f87171;--color-error-muted:rgba(248,113,113,0.12);
  --color-info:#818cf8;--color-info-muted:rgba(129,140,248,0.12);
  /* Category colors */
  --cat-flight:#60a5fa;--cat-flight-muted:rgba(96,165,250,0.15);
  --cat-hotel:#34d399;--cat-hotel-muted:rgba(52,211,153,0.12);
  --cat-activity:#fb923c;--cat-activity-muted:rgba(251,146,60,0.12);
  --cat-restaurant:#f472b6;--cat-restaurant-muted:rgba(244,114,182,0.12);
  --cat-beach:#38bdf8;--cat-beach-muted:rgba(56,189,248,0.12);
  --cat-baby:#fbbf24;--cat-baby-muted:rgba(251,191,36,0.12);
  /* Text hierarchy */
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --radius:16px;--radius-sm:8px;
  font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  color:var(--text);background:var(--bg);
  -webkit-tap-highlight-color:transparent;
}
/* Ambient background gradient */
body::before{
  content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(ellipse at 20% 50%,rgba(96,165,250,0.06) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 20%,rgba(168,85,247,0.04) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}
/* Reduced motion */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{display:flex;flex-direction:column;position:relative}

/* Status bar spacer for iOS */
.safe-top{height:env(safe-area-inset-top,0px);background:var(--bg)}

/* Header */
.header{
  padding:12px 16px 8px;background:var(--bg);position:relative;z-index:10;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.trip-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);font-weight:600}
.traveler-pills{display:flex;gap:6px}
.pill{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,0.06);color:var(--text2)}
.date-nav{display:flex;align-items:center;justify-content:space-between;gap:8px}
.nav-btn{
  width:44px;height:44px;border:none;background:rgba(255,255,255,0.05);
  color:var(--text);font-size:20px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  -webkit-appearance:none;touch-action:manipulation;
}
.nav-btn:active{background:rgba(255,255,255,0.12)}
.date-center{text-align:center;flex:1}
.date-main{font-size:18px;font-weight:700;color:var(--text)}
.date-sub{font-size:12px;color:var(--text2);margin-top:1px}
.day-badge{
  display:inline-block;font-size:10px;padding:2px 10px;border-radius:20px;
  margin-top:4px;font-weight:600;
}
.badge-travel{background:rgba(96,165,250,0.15);color:var(--blue)}
.badge-stay{background:rgba(52,211,153,0.15);color:var(--green)}
.badge-transfer{background:rgba(251,191,36,0.15);color:#fef3c7}

/* Day chips (replaces dots) */
.day-chips{
  display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
  padding:6px 16px 4px;flex-shrink:0;scroll-snap-type:x mandatory;
}
.day-chips::-webkit-scrollbar{display:none}
.day-chip{
  flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;
  background:var(--surface-1);border:1px solid var(--border-subtle);
  white-space:nowrap;scroll-snap-align:center;cursor:pointer;
  transition:all .2s;color:var(--text2);
}
.day-chip.active{border-color:var(--blue);color:var(--blue);background:rgba(96,165,250,0.1)}
.day-chip.travel{border-color:rgba(96,165,250,0.2)}
.day-chip.stay{border-color:rgba(52,211,153,0.15)}
.day-chip.transfer{border-color:rgba(251,191,36,0.15)}
.day-chip.active.travel{border-color:var(--blue);color:var(--blue);background:rgba(96,165,250,0.12)}
.day-chip.active.stay{border-color:var(--green);color:var(--green);background:rgba(52,211,153,0.1)}
.day-chip.active.transfer{border-color:var(--amber);color:#fef3c7;background:rgba(251,191,36,0.1)}

/* Swipe container */
.swipe-container{
  flex:1;overflow:hidden;position:relative;
}
.swipe-track{
  display:flex;height:100%;transition:transform .3s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.day-panel{
  min-width:100%;height:100%;overflow-y:auto;overflow-x:hidden;
  padding:12px 16px 20px;-webkit-overflow-scrolling:touch;
}

/* Cards — glassmorphism */
.card{
  background:var(--surface-glass);
  backdrop-filter:blur(12px) saturate(1.2);-webkit-backdrop-filter:blur(12px) saturate(1.2);
  border:1px solid var(--border);border-top-color:rgba(255,255,255,0.12);
  border-radius:var(--radius);padding:16px;margin-bottom:12px;
  box-shadow:0 4px 24px rgba(0,0,0,0.15);
  transition:transform 150ms cubic-bezier(0.2,0,0,1),background 150ms ease;
}
.card:active{transform:scale(0.98);background:var(--surface-2)}
/* Card entrance animation */
.day-panel .card{opacity:0;transform:translateY(12px);animation:card-enter .3s cubic-bezier(0.2,0,0,1) forwards}
.day-panel .card:nth-child(2){animation-delay:60ms}
.day-panel .card:nth-child(3){animation-delay:120ms}
.day-panel .card:nth-child(4){animation-delay:180ms}
.day-panel .card:nth-child(5){animation-delay:240ms}
.day-panel .card:nth-child(6){animation-delay:300ms}
@keyframes card-enter{to{opacity:1;transform:translateY(0)}}
.card-header{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
}
.card-icon{
  width:40px;height:40px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.card-icon.flight{background:rgba(96,165,250,0.15)}
.card-icon.hotel{background:rgba(52,211,153,0.15)}
.card-icon.car{background:rgba(168,85,247,0.15)}
.card-icon.checkout{background:rgba(248,113,113,0.15)}
.card-icon.checkin{background:rgba(52,211,153,0.15)}
.card-icon.baby{background:rgba(251,191,36,0.15)}
.card-icon.transport{background:rgba(148,163,184,0.12)}
.card-icon.info{background:rgba(96,165,250,0.1)}
.card-title{font-size:15px;font-weight:700}
.card-subtitle{font-size:12px;color:var(--text2)}

.flight-route{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;margin:8px 0;border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}
.route-point{text-align:center}
.route-code{font-size:22px;font-weight:800;letter-spacing:1px}
.route-city{font-size:11px;color:var(--text2)}
.route-time{font-size:13px;color:var(--blue);font-weight:600;margin-top:2px}
.route-line{
  flex:1;height:1px;background:var(--border);margin:0 12px;position:relative;
}
.route-line::after{
  content:'';position:absolute;right:-2px;top:-3px;
  width:0;height:0;border-left:6px solid var(--text3);
  border-top:3px solid transparent;border-bottom:3px solid transparent;
}
.route-duration{
  position:absolute;top:-18px;left:50%;transform:translateX(-50%);
  font-size:10px;color:var(--text3);white-space:nowrap;
}
.next-day{font-size:9px;color:var(--amber);font-weight:600}

.detail-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;font-size:13px;
}
.detail-label{color:var(--text2)}
.detail-value{font-weight:600;text-align:right}
.conf-code{
  font-family:'SF Mono',SFMono-Regular,Menlo,monospace;
  color:var(--amber);font-weight:700;letter-spacing:.5px;
}

.passenger-row{
  display:flex;align-items:center;gap:8px;padding:6px 0;
  border-bottom:1px solid var(--border);font-size:13px;
}
.passenger-row:last-child{border-bottom:none}
.pax-name{flex:1}
.pax-seat{
  font-size:11px;padding:2px 8px;background:rgba(255,255,255,0.06);
  border-radius:4px;color:var(--text2);font-family:monospace;
}
.pax-type{font-size:10px;color:var(--text3)}

.night-counter{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;background:rgba(52,211,153,0.1);
  border-radius:20px;font-size:12px;color:var(--green);font-weight:600;
}

.amenity-tag{
  display:inline-block;padding:6px 12px;margin:3px;
  background:rgba(251,191,36,0.12);border-radius:20px;
  font-size:11px;color:#fef3c7;min-height:32px;
}

.section-title{
  font-size:12px;text-transform:uppercase;letter-spacing:1px;
  color:var(--text3);font-weight:600;margin:16px 0 8px;
}

.placeholder-card{
  background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.08);
  border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:12px;
}
.placeholder-card .ph-icon{font-size:24px;margin-bottom:4px}
.placeholder-card .ph-text{font-size:12px;color:var(--text3)}

.notes-card{
  background:rgba(96,165,250,0.05);border:1px solid rgba(96,165,250,0.1);
  border-radius:var(--radius);padding:12px;margin-bottom:12px;
}
.note-item{font-size:13px;color:var(--text2);padding:3px 0;padding-left:16px;position:relative}
.note-item::before{content:'\2022';position:absolute;left:0;color:var(--blue)}

/* Transport badge */
.transport-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 12px;background:rgba(148,163,184,0.08);
  border-radius:20px;font-size:12px;color:var(--text2);margin-bottom:12px;
}

/* Bookings tab */
.bookings-view{padding:12px 16px 20px;overflow-y:auto;height:100%;-webkit-overflow-scrolling:touch}
.booking-flight{
  display:flex;align-items:center;gap:12px;padding:12px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:8px;
}
.bf-icon{font-size:20px;width:40px;text-align:center;flex-shrink:0}
.bf-info{flex:1}
.bf-route{font-size:14px;font-weight:700}
.bf-detail{font-size:12px;color:var(--text2)}
.bf-conf{font-size:11px;font-family:monospace;color:var(--amber)}
.bf-status{
  font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;
  background:rgba(52,211,153,0.12);color:var(--green);text-transform:uppercase;
}

.booking-hotel{
  padding:14px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:8px;
}
.bh-name{font-size:15px;font-weight:700;margin-bottom:2px}
.bh-city{font-size:12px;color:var(--text2)}
.bh-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.bh-dates{font-size:12px;color:var(--text2)}
.bh-nights{font-size:11px;padding:2px 8px;background:rgba(52,211,153,0.1);border-radius:20px;color:var(--green)}
.bh-conf{font-size:11px;font-family:monospace;color:var(--amber);margin-top:4px}

/* Bottom nav */
.bottom-nav{
  display:flex;background:var(--bg2);border-top:1px solid var(--border);
  padding-bottom:env(safe-area-inset-bottom,0px);flex-shrink:0;
}
.nav-tab{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 0 8px;gap:2px;border:none;background:none;
  color:var(--text3);font-size:10px;cursor:pointer;
  -webkit-appearance:none;touch-action:manipulation;min-height:44px;
}
.nav-tab.active{color:var(--blue)}
.nav-tab .tab-icon{font-size:20px;line-height:1}

/* Views */
.view{display:none;flex:1;overflow:hidden}
.view.active{display:flex;flex-direction:column}

/* Map */
#map-container{flex:1;position:relative}
#mapbox-map{width:100%;height:100%}
.map-filters{
  position:absolute;top:12px;left:12px;right:12px;z-index:5;
  display:flex;gap:6px;flex-wrap:wrap;
}
.map-chip{
  padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;
  background:rgba(15,23,42,0.85);color:var(--text2);border:1px solid var(--border);
  cursor:pointer;-webkit-appearance:none;touch-action:manipulation;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:all .15s;white-space:nowrap;
}
.map-chip.active{color:var(--blue);border-color:rgba(96,165,250,0.4);background:rgba(96,165,250,0.15)}
.map-marker{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;border:2px solid rgba(255,255,255,0.3);
  box-shadow:0 2px 8px rgba(0,0,0,0.4);transition:transform .15s;
}
.map-marker:hover{transform:scale(1.15)}
.map-marker.accommodation{background:#059669}
.map-marker.activity{background:#ea580c}
.map-marker.restaurant{background:#dc2626}
.map-marker.beach{background:#7c3aed}
.map-marker.market{background:#d97706}
.map-marker.airport{background:#2563eb}
.mapboxgl-popup-content{
  background:var(--bg2)!important;color:var(--text)!important;
  border-radius:var(--radius)!important;padding:14px 16px!important;
  box-shadow:0 4px 24px rgba(0,0,0,0.5)!important;
  border:1px solid var(--border)!important;max-width:220px!important;
}
.mapboxgl-popup-tip{border-top-color:var(--bg2)!important}
.mapboxgl-popup-close-button{color:var(--text2)!important;font-size:18px!important;right:6px!important;top:4px!important}
.popup-name{font-size:14px;font-weight:700;margin-bottom:4px}
.popup-type{
  display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;
  padding:2px 8px;border-radius:10px;margin-bottom:8px;letter-spacing:.5px;
}
.popup-type.accommodation{background:rgba(5,150,105,0.2);color:#34d399}
.popup-type.activity{background:rgba(234,88,12,0.2);color:#fb923c}
.popup-type.restaurant{background:rgba(220,38,38,0.2);color:#f87171}
.popup-type.beach{background:rgba(124,58,237,0.2);color:#a78bfa}
.popup-type.market{background:rgba(217,119,6,0.2);color:#fbbf24}
.popup-type.airport{background:rgba(37,99,235,0.2);color:#60a5fa}
.popup-dir{
  display:inline-block;font-size:12px;color:var(--blue);text-decoration:none;font-weight:600;
}
.popup-dir:hover{text-decoration:underline}

/* Status view */
.status-view{padding:16px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.status-countdown{
  text-align:center;padding:24px;margin-bottom:16px;
  background:linear-gradient(135deg,rgba(96,165,250,0.1),rgba(168,85,247,0.1));
  border-radius:var(--radius);border:1px solid var(--border);
}
.countdown-num{font-size:48px;font-weight:800;color:var(--blue)}
.countdown-label{font-size:14px;color:var(--text2);margin-top:4px}
.status-item{
  display:flex;align-items:center;gap:12px;padding:12px;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:8px;
}
.si-icon{font-size:20px;width:36px;text-align:center}
.si-info{flex:1}
.si-title{font-size:14px;font-weight:600}
.si-detail{font-size:12px;color:var(--text2)}

/* AM/PM transfer sections */
.transfer-label{
  display:flex;align-items:center;gap:8px;margin:12px 0 8px;
}
.transfer-label .tl-badge{
  font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;
  text-transform:uppercase;letter-spacing:1px;
}
.tl-am{background:rgba(251,191,36,0.15);color:#fef3c7}
.tl-mid{background:rgba(96,165,250,0.15);color:var(--blue)}
.tl-pm{background:rgba(52,211,153,0.15);color:var(--green)}
.transfer-label .tl-text{font-size:13px;color:var(--text2)}

/* Scrollbar */
::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>
<div class="safe-top"></div>

<!-- DAILY VIEW -->
<div class="view active" id="view-daily">
  <div class="header">
    <div class="header-top">
      <div class="trip-title">EUROPE 2026</div>
      <div class="traveler-pills">
        <span class="pill">Daniel</span>
        <span class="pill">Michelle</span>
        <span class="pill">Owen</span>
      </div>
    </div>
    <div class="date-nav">
      <button class="nav-btn" id="btn-prev" aria-label="Previous day">&lsaquo;</button>
      <div class="date-center">
        <div class="date-main" id="hdr-date">Saturday, May 3</div>
        <div class="date-sub" id="hdr-loc">Chicago, USA</div>
        <div class="day-badge badge-travel" id="hdr-badge">Day 1 of 15</div>
      </div>
      <button class="nav-btn" id="btn-next" aria-label="Next day">&rsaquo;</button>
    </div>
  </div>
  <div class="day-chips" id="day-chips"></div>
  <div class="swipe-container" id="swipe-container">
    <div class="swipe-track" id="swipe-track"></div>
  </div>
</div>

<!-- MAP VIEW -->
<div class="view" id="view-map">
  <div class="map-filters" id="map-filters">
    <button class="map-chip active" data-filter="all">All</button>
    <button class="map-chip" data-filter="activity">📍 Activities</button>
    <button class="map-chip" data-filter="restaurant">🍽️ Restaurants</button>
    <button class="map-chip" data-filter="beach">🏖️ Beaches</button>
  </div>
  <div id="map-container">
    <div id="mapbox-map"></div>
  </div>
</div>

<!-- BOOKINGS VIEW -->
<div class="view" id="view-bookings">
  <div class="bookings-view" id="bookings-content"></div>
</div>

<!-- STATUS VIEW -->
<div class="view" id="view-status">
  <div class="status-view" id="status-content"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-tab active" data-view="daily"><span class="tab-icon">📅</span>Daily</button>
  <button class="nav-tab" data-view="map"><span class="tab-icon">🗺️</span>Map</button>
  <button class="nav-tab" data-view="bookings"><span class="tab-icon">📋</span>Bookings</button>
  <button class="nav-tab" data-view="status"><span class="tab-icon">⚡</span>Status</button>
</div>

<script>
// Register service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

let TRIP = null;
let currentDay = 0;
let touchStartX = 0;
let touchDeltaX = 0;
let isDragging = false;
const SWIPE_THRESHOLD = 50;

// Load data
fetch('trip.json').then(r=>r.json()).then(data=>{
  TRIP = data;
  init();
}).catch(()=>{
  document.getElementById('swipe-track').innerHTML='<div class="day-panel" style="display:flex;align-items:center;justify-content:center"><p style="color:var(--text3)">Could not load trip data.</p></div>';
});

function init(){
  buildDots();
  buildAllPanels();
  buildBookings();
  buildStatus();
  setupNav();
  setupSwipe();
  goToDay(0, false);
}

// Format date
function fmtDate(str){
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}
function fmtShort(str){
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function fmtTime(t){
  if(!t) return '';
  const [h,m] = t.split(':').map(Number);
  const ampm = h>=12?'PM':'AM';
  const hr = h%12||12;
  return `${hr}:${m.toString().padStart(2,'0')} ${ampm}`;
}

// Build day chips (replaces dots)
function buildDots(){
  const el = document.getElementById('day-chips');
  el.innerHTML = TRIP.days.map((day,i)=>{
    const city = day.location.city.split(',')[0];
    const label = day.day_type === 'transfer' ? 'Transfer' : city;
    return `<div class="day-chip ${day.day_type}" data-i="${i}">Day ${day.day_number} — ${label}</div>`;
  }).join('');
  el.addEventListener('click', e=>{
    const chip = e.target.closest('.day-chip');
    if(chip) goToDay(+chip.dataset.i, true);
  });
}

function updateDots(){
  document.querySelectorAll('.day-chip').forEach((d,i)=>{
    d.classList.toggle('active', i===currentDay);
  });
  // Auto-scroll active chip into view
  const active = document.querySelector('.day-chip.active');
  if(active) active.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

// Build all day panels
function buildAllPanels(){
  const track = document.getElementById('swipe-track');
  track.innerHTML = TRIP.days.map((day,i) => `<div class="day-panel">${renderDay(day)}</div>`).join('');
}

function renderDay(day){
  let html = '';

  // Transport badge
  if(day.transport_mode){
    const tm = day.transport_mode === 'transit' ? '🚇 Public Transit' : '🚗 Rental Car';
    html += `<div class="transport-badge">${tm}</div>`;
  }

  // TRANSFER day structure
  if(day.day_type === 'transfer'){
    // AM: checkout
    if(day.checkout){
      html += `<div class="transfer-label"><span class="tl-badge tl-am">AM</span><span class="tl-text">Checkout</span></div>`;
      html += renderCheckout(day.checkout);
    }
    // MID: flight
    if(day.flights && day.flights.length){
      html += `<div class="transfer-label"><span class="tl-badge tl-mid">MID</span><span class="tl-text">Flight</span></div>`;
      day.flights.forEach(f => html += renderFlight(f));
    }
    // Car rental on May 7
    if(day.car_rental && day.car_rental.active){
      html += renderCarRental(day.car_rental);
    }
    // PM: checkin
    if(day.checkin){
      html += `<div class="transfer-label"><span class="tl-badge tl-pm">PM</span><span class="tl-text">Check In</span></div>`;
      html += renderCheckin(day.checkin);
    }

    // Notes
    if(day.notes && day.notes.length){
      html += renderNotes(day.notes);
    }
    return html;
  }

  // TRAVEL day
  if(day.day_type === 'travel'){
    // Checkout if exists (May 17)
    if(day.checkout){
      html += renderCheckout(day.checkout);
    }
    // Flights
    if(day.flights && day.flights.length){
      day.flights.forEach(f => html += renderFlight(f));
    }
    if(day.notes && day.notes.length){
      html += renderNotes(day.notes);
    }
    return html;
  }

  // STAY day
  if(day.accommodation){
    html += renderAccommodation(day.accommodation);
    // Baby amenities
    if(day.accommodation.baby_amenities && day.accommodation.baby_amenities.length){
      html += renderBabyAmenities(day.accommodation);
    }
  }
  // Car rental badge
  if(day.car_rental && day.car_rental.active){
    html += `<div class="card" style="padding:12px">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="card-icon car">🚗</div>
        <div><div style="font-size:13px;font-weight:600">Rental Car Active</div>
        <div style="font-size:11px;color:var(--text2)">Expedia #${day.car_rental.confirmation}</div></div>
      </div></div>`;
  }

  // Placeholders
  html += `<div class="section-title">Activities Nearby</div>`;
  html += `<div class="placeholder-card"><div class="ph-icon">🏛️</div><div class="ph-text">Activities coming soon</div></div>`;
  html += `<div class="section-title">Restaurant Picks</div>`;
  html += `<div class="placeholder-card"><div class="ph-icon">🍽️</div><div class="ph-text">Restaurant picks coming soon</div></div>`;

  if(day.notes && day.notes.length){
    html += renderNotes(day.notes);
  }
  return html;
}

  return `<div class="card">
    <div class="card-header">
      <div class="card-icon flight">✈️</div>
      <div>
        <div class="card-title">${f.airline} ${f.flight_number}</div>

    <div class="detail-row"><span class="detail-label">Class</span><span class="detail-value">${f.class}</span></div>

// Navigate days
function goToDay(i, animate){
  if(i < 0 || i >= TRIP.days.length) return;
  currentDay = i;
  const day = TRIP.days[i];

  // Update header
  document.getElementById('hdr-date').textContent = fmtDate(day.date);
  const locText = day.location.emoji + ' ' + day.location.city + ', ' + day.location.country;
  document.getElementById('hdr-loc').textContent = locText;

  const badge = document.getElementById('hdr-badge');
  badge.textContent = dayBadgeText(day);
  badge.className = 'day-badge badge-' + day.day_type;

  // Move track
  const track = document.getElementById('swipe-track');
  track.style.transition = animate ? 'transform .3s cubic-bezier(.4,0,.2,1)' : 'none';
  track.style.transform = `translateX(-${i * 100}%)`;

  updateDots();

  // Update nav buttons
  document.getElementById('btn-prev').style.visibility = i === 0 ? 'hidden' : 'visible';
  document.getElementById('btn-next').style.visibility = i === TRIP.days.length-1 ? 'hidden' : 'visible';
}

function dayBadgeText(day){
  const icons = {travel:'✈️',stay:'🏠',transfer:'🔄'};
  const labels = {travel:'Travel',stay:'Stay',transfer:'Transfer'};
  return `${icons[day.day_type]} ${labels[day.day_type]} \u2022 Day ${day.day_number} of ${TRIP.trip.total_days}`;
}

// Navigation
function setupNav(){
  document.getElementById('btn-prev').addEventListener('click', ()=> goToDay(currentDay-1, true));
  document.getElementById('btn-next').addEventListener('click', ()=> goToDay(currentDay+1, true));

  // Tab nav
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', ()=>{
      const v = tab.dataset.view;
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
      document.getElementById('view-'+v).classList.add('active');
    });
  });
}

// Swipe handling
function setupSwipe(){
  const container = document.getElementById('swipe-container');
  const track = document.getElementById('swipe-track');

  container.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchDeltaX = 0;
    isDragging = true;
    track.style.transition = 'none';
  }, {passive:true});

  container.addEventListener('touchmove', e => {
    if(!isDragging) return;
    touchDeltaX = e.touches[0].clientX - touchStartX;
    // Resist at edges
    if((currentDay === 0 && touchDeltaX > 0) || (currentDay === TRIP.days.length-1 && touchDeltaX < 0)){
      touchDeltaX *= 0.3;
    }
    const offset = -(currentDay * container.offsetWidth) + touchDeltaX;
    track.style.transform = `translateX(${offset}px)`;
  }, {passive:true});

  container.addEventListener('touchend', () => {
    if(!isDragging) return;
    isDragging = false;
    if(touchDeltaX < -SWIPE_THRESHOLD && currentDay < TRIP.days.length-1){
      goToDay(currentDay+1, true);
    } else if(touchDeltaX > SWIPE_THRESHOLD && currentDay > 0){
      goToDay(currentDay-1, true);
    } else {
      goToDay(currentDay, true);
    }
  }, {passive:true});

  // Keyboard
  document.addEventListener('keydown', e => {
    if(e.key === 'ArrowRight') goToDay(currentDay+1, true);
    if(e.key === 'ArrowLeft') goToDay(currentDay-1, true);
  });
}

// Map day index -> city key
function getCityForDay(dayIdx) {
  const d = TRIP.days[dayIdx];
  const city = d.location.city.toLowerCase();
  if (city.includes('vienna') || city.includes('wien')) return 'vienna';
  if (city.includes('crete') || city.includes('heraklion') || city.includes('agios')) return 'crete';
  if (city.includes('zurich') || city.includes('z\u00fcrich')) return 'zurich';
  if (city.includes('chicago')) return 'chicago';
  // Transfer days
  if (city.includes('vienna') && city.includes('crete')) return 'transfer_vie_her';
  if (city.includes('crete') && city.includes('zurich')) return 'transfer_her_zrh';
  return null;
}

function getMapConfigForDay(dayIdx) {
  const day = TRIP.days[dayIdx];
  const dt = day.day_type;
  const city = getCityForDay(dayIdx);

  if (dt === 'stay') {
    let accomKey, poisKey;
    if (city === 'vienna') { accomKey = 'vienna'; poisKey = 'vienna'; }
    else if (city === 'crete') { accomKey = 'crete'; poisKey = 'crete'; }
    else if (city === 'zurich') { accomKey = 'zurich'; poisKey = 'zurich'; }
    else return null;
    const accom = COORDS.accommodations[accomKey];
    return {
      type: 'stay',
      center: [accom.lng, accom.lat],
      zoom: poisKey === 'crete' ? 11 : 12,
      accommodation: accom,
      pois: COORDS.pois[poisKey] || []
    };
  }

  if (dt === 'transfer') {
    // May 7: Vienna -> VIE -> HER -> Daios Cove
    if (dayIdx === 4) {
      return {
        type: 'transfer',
        segments: [
          { from: COORDS.accommodations.vienna, to: COORDS.airports.VIE, mode: 'ground' },
          { from: COORDS.airports.VIE, to: COORDS.airports.HER, mode: 'flight' },
          { from: COORDS.airports.HER, to: COORDS.accommodations.crete, mode: 'ground' }
        ],
        airports: [COORDS.airports.VIE, COORDS.airports.HER],
        accommodations: [COORDS.accommodations.vienna, COORDS.accommodations.crete]
      };
    }
    // May 14: Daios Cove -> HER -> ZRH -> Radisson
    if (dayIdx === 11) {
      return {
        type: 'transfer',
        segments: [
          { from: COORDS.accommodations.crete, to: COORDS.airports.HER, mode: 'ground' },
          { from: COORDS.airports.HER, to: COORDS.airports.ZRH, mode: 'flight' },
          { from: COORDS.airports.ZRH, to: COORDS.accommodations.zurich, mode: 'ground' }
        ],
        airports: [COORDS.airports.HER, COORDS.airports.ZRH],
        accommodations: [COORDS.accommodations.crete, COORDS.accommodations.zurich]
      };
    }
    return null;
  }

  if (dt === 'travel') {
    // May 3: ORD -> VIE
    if (dayIdx === 0) {
      return {
        type: 'travel',
        segments: [
          { from: COORDS.airports.ORD, to: COORDS.airports.VIE, mode: 'flight' }
        ],
        airports: [COORDS.airports.ORD, COORDS.airports.VIE]
      };
    }
    // May 17: ZRH -> ORD
    if (dayIdx === 14) {
      return {
        type: 'travel',
        segments: [
          { from: COORDS.airports.ZRH, to: COORDS.airports.ORD, mode: 'flight' }
        ],
        airports: [COORDS.airports.ZRH, COORDS.airports.ORD]
      };
    }
    return null;
  }

  return null;
}

function createMarkerEl(type) {
  const el = document.createElement('div');
  el.className = 'map-marker ' + type;
  const icons = {
    accommodation: '\uD83C\uDFE8',
    activity: '\uD83D\uDCCD',
    restaurant: '\uD83C\uDF7D\uFE0F',
    beach: '\uD83C\uDFD6\uFE0F',
    market: '\uD83D\uDED2',
    airport: '\u2708\uFE0F'
  };
  el.textContent = icons[type] || '\uD83D\uDCCD';
  return el;
}

function makePopupHTML(name, type, lat, lng) {
  const dirUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
  return `<div class="popup-name">${name}</div>
    <span class="popup-type ${type}">${type}</span><br>
    <a class="popup-dir" href="${dirUrl}" target="_blank" rel="noopener">Directions \u2197</a>`;
}

function clearMap() {
  mapMarkers.forEach(m => m.marker.remove());
  mapMarkers = [];
  if (mapPopup) { mapPopup.remove(); mapPopup = null; }
  // Remove route layers/sources
  if (mapInstance) {
    ['route-flight', 'route-ground'].forEach(id => {
      if (mapInstance.getLayer(id)) mapInstance.removeLayer(id);
      if (mapInstance.getSource(id)) mapInstance.removeSource(id);
    });
    // Remove any numbered route sources
    for (let i = 0; i < 10; i++) {
      ['route-flight-' + i, 'route-ground-' + i].forEach(id => {
        if (mapInstance.getLayer(id)) mapInstance.removeLayer(id);
        if (mapInstance.getSource(id)) mapInstance.removeSource(id);
      });
    }
  }
}

function addMarker(lat, lng, name, type) {
  const el = createMarkerEl(type);
  const marker = new mapboxgl.Marker({ element: el })
    .setLngLat([lng, lat])
    .addTo(mapInstance);
  el.addEventListener('click', (e) => {
    e.stopPropagation();
    if (mapPopup) mapPopup.remove();
    mapPopup = new mapboxgl.Popup({ offset: 20, closeButton: true })
      .setLngLat([lng, lat])
      .setHTML(makePopupHTML(name, type, lat, lng))
      .addTo(mapInstance);
  });
  mapMarkers.push({ marker, type, el });
}

function addRouteLine(from, to, mode, idx) {
  const id = 'route-' + mode + '-' + idx;
  // For flights, create a curved great-circle-ish arc
  const coords = [];
  if (mode === 'flight') {
    const steps = 60;
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const lng = from.lng + t * (to.lng - from.lng);
      const lat = from.lat + t * (to.lat - from.lat);
      // Add arc height
      const arc = Math.sin(t * Math.PI) * Math.abs(to.lng - from.lng) * 0.15;
      coords.push([lng, lat + arc]);
    }
  } else {
    coords.push([from.lng, from.lat]);
    coords.push([to.lng, to.lat]);
  }
  mapInstance.addSource(id, { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } } });
  mapInstance.addLayer({
    id: id,
    type: 'line',
    source: id,
    paint: {
      'line-color': mode === 'flight' ? '#60a5fa' : '#34d399',
      'line-width': mode === 'flight' ? 2.5 : 2,
      'line-dasharray': mode === 'flight' ? [4, 4] : [1]
    }
  });
}

function renderMapForDay(dayIdx) {
  if (!mapInstance) return;
  clearMap();
  const config = getMapConfigForDay(dayIdx);
  if (!config) {
    mapInstance.flyTo({ center: [12, 48], zoom: 3 });
    return;
  }

  if (config.type === 'stay') {
    mapInstance.flyTo({ center: config.center, zoom: config.zoom, duration: 800 });
    // Accommodation marker
    addMarker(config.accommodation.lat, config.accommodation.lng, config.accommodation.name, 'accommodation');
    // POI markers
    config.pois.forEach(p => addMarker(p.lat, p.lng, p.name, p.type));
    applyFilter();
    return;
  }

  if (config.type === 'transfer' || config.type === 'travel') {
    // Fit bounds to all points
    const bounds = new mapboxgl.LngLatBounds();
    if (config.segments) {
      config.segments.forEach((seg, i) => {
        bounds.extend([seg.from.lng, seg.from.lat]);
        bounds.extend([seg.to.lng, seg.to.lat]);
        // defer line add until style ready
        addRouteLine(seg.from, seg.to, seg.mode, i);
      });
    }
    if (config.airports) {
      config.airports.forEach(a => {
        addMarker(a.lat, a.lng, a.name, 'airport');
        bounds.extend([a.lng, a.lat]);
      });
    }
    if (config.accommodations) {
      config.accommodations.forEach(a => {
        addMarker(a.lat, a.lng, a.name, 'accommodation');
        bounds.extend([a.lng, a.lat]);
      });
    }
    mapInstance.fitBounds(bounds, { padding: 60, duration: 800, maxZoom: 8 });
    applyFilter();
    return;
  }
}

function applyFilter() {
  mapMarkers.forEach(m => {
    if (activeFilter === 'all') {
      m.el.style.display = '';
    } else {
      m.el.style.display = (m.type === activeFilter || m.type === 'accommodation' || m.type === 'airport') ? '' : 'none';
    }
  });
}

function initMap() {
  if (mapInitialized) return;
  mapboxgl.accessToken = MAPBOX_TOKEN;
  mapInstance = new mapboxgl.Map({
    container: 'mapbox-map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [12, 48],
    zoom: 3,
    attributionControl: false
  });
  mapInstance.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'bottom-right');
  mapInstance.on('load', () => {
    renderMapForDay(currentDay);
  });
  mapInitialized = true;

  // Filter chips
  document.querySelectorAll('#map-filters .map-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('#map-filters .map-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = chip.dataset.filter;
      applyFilter();
    });
  });
}

// Hook into tab switching — attach directly since setupNav() already ran at init
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const v = tab.dataset.view;
    if (v === 'map') {
      setTimeout(() => {
        if (!mapInitialized) {
          initMap();
        } else {
          mapInstance.resize();
          renderMapForDay(currentDay);
        }
      }, 50);
    }
  });
});

// Also update map when day changes (patch goToDay)
const _origGoToDay = goToDay;
goToDay = function(i, animate) {
  _origGoToDay(i, animate);
  // If map tab is active, re-render
  if (mapInitialized && document.getElementById('view-map').classList.contains('active')) {
    renderMapForDay(currentDay);
  }
};
</script>
</body>
</html>
